<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Portal</title>
  <style>
    /* Basic styling to make the page look modern */
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #131314; /* Gemini dark theme color */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
    }

    .launch-button {
      display: inline-block;
      padding: 12px 24px;
      font-size: 18px;
      color: #fff;
      background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
      text-decoration: none;
      border-radius: 50px;
      transition: transform 0.2s ease;
    }

    .launch-button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Gemini AI</h1>
    <p>The web interface cannot be embedded for security reasons.</p>
    <a href="https://gemini.google.com/" target="_blank" class="launch-button">
      Launch Gemini
    </a>
  </div>

</body>
</html>
