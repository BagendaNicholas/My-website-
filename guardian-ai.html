<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guardian AI - Full System</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
}
h1 { color:#00ffcc; }

/* LOGIN */
#loginBox {
  text-align:center;
  margin-top:60px;
}

button {
  padding:10px 15px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.google {
  background:#00ffcc;
  color:black;
}

.logout {
  background:#ef4444;
  color:white;
}

/* AI SECTION */
#aiBox {
  display:none;
  max-width:700px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:15px;
}

#chat {
  height:300px;
  overflow-y:auto;
  border:1px solid #334155;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:75%;
  padding:10px;
  border-radius:10px;
  border:none;
}

.send {
  background:#00ffcc;
}
</style>
</head>

<body>

<header>
<h1>🤖 Guardian AI</h1>
<p>Login + Memory + Chat System</p>
</header>

<!-- LOGIN -->
<div id="loginBox">
  <button class="google" onclick="loginGoogle()">🔵 Login with Google</button>
  <p id="status">Checking login...</p>
</div>

<!-- AI -->
<div id="aiBox">

  <h3 id="welcome"></h3>

  <button class="logout" onclick="logout()">🚪 Logout</button>

  <div id="chat"></div>

  <input id="msg" placeholder="Ask Guardian AI..." />
  <button class="send" onclick="sendMsg()">Send</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
  authDomain: "my-website-357cb.firebaseapp.com",
  projectId: "my-website-357cb",
  storageBucket: "my-website-357cb.firebasestorage.app",
  messagingSenderId: "759627961944",
  appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* LOGIN */
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res => setUser(res.user))
    .catch(err => console.log(err));
}

/* LOGOUT */
function logout() {
  auth.signOut();
}

/* SET USER */
function setUser(user) {
  currentUser = user;

  db.collection("users").doc(user.uid).set({
    name: user.displayName || user.email,
    email: user.email,
    lastLogin: new Date()
  }, { merge:true });

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("aiBox").style.display = "block";

  document.getElementById("welcome").innerText =
    "Welcome back " + (user.displayName || user.email);

  loadChat(user.uid);
}

/* LOAD CHAT MEMORY */
function loadChat(uid) {
  db.collection("chats").doc(uid).get().then(doc => {
    if (!doc.exists) {
      db.collection("chats").doc(uid).set({ messages: [] });
    } else {
      const msgs = doc.data().messages || [];
      msgs.forEach(m => addMsg(m.role, m.text));
    }
  });
}

/* SEND MESSAGE */
function sendMsg() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text || !currentUser) return;

  addMsg("you", text);
  saveMsg("user", text);

  input.value = "";

  setTimeout(() => {
    const reply = "🤖 Guardian AI: I received your message.";
    addMsg("ai", reply);
    saveMsg("ai", reply);
  }, 800);
}

/* ADD MESSAGE TO UI */
function addMsg(role, text) {
  const chat = document.getElementById("chat");

  const p = document.createElement("p");
  p.innerHTML = `<b>${role}:</b> ${text}`;

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

/* SAVE MEMORY */
function saveMsg(role, text) {
  if (!currentUser) return;

  const ref = db.collection("chats").doc(currentUser.uid);

  ref.get().then(doc => {
    let messages = doc.exists ? doc.data().messages : [];

    messages.push({
      role,
      text,
      time: new Date()
    });

    if (messages.length > 100) messages = messages.slice(-100);

    ref.set({ messages }, { merge:true });
  });
}

/* AUTH CHECK */
auth.onAuthStateChanged(user => {
  if (user) {
    setUser(user);
  } else {
    currentUser = null;

    document.getElementById("loginBox").style.display = "block";
    document.getElementById("aiBox").style.display = "none";

    document.getElementById("status").innerText =
      "❌ Not logged in";
  }
});
</script>

</body>
</html>
