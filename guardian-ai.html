<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guardian AI - Login System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: rgba(0,0,0,0.4);
    }

    h1 {
      color: #00ffcc;
      margin: 0;
    }

    .container {
      padding: 30px;
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .google {
      background: #00ffcc;
      color: black;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 20px;
      color: #94a3b8;
    }

    .box {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>🤖 Guardian AI</h1>
  <p>Login + Memory System</p>
</header>

<div class="container">

  <div id="authBox">
    <button class="google" onclick="loginWithGoogle()">🔵 Login with Google</button>
  </div>

  <div class="box">
    <button class="logout" onclick="logout()">🚪 Logout</button>
  </div>

  <p class="status" id="status">Checking login...</p>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
    authDomain: "my-website-357cb.firebaseapp.com",
    projectId: "my-website-357cb",
    storageBucket: "my-website-357cb.firebasestorage.app",
    messagingSenderId: "759627961944",
    appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d",
    measurementId: "G-MK9ZP12G83"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;

  // 🔵 GOOGLE LOGIN
  function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
      .then(result => {
        handleUser(result.user);
      })
      .catch(error => console.log(error));
  }

  // 🚪 LOGOUT
  function logout() {
    auth.signOut();
  }

  // 🧠 HANDLE USER (SAVE + LOAD MEMORY)
  function handleUser(user) {
    currentUser = user;

    // Save user profile
    db.collection("users").doc(user.uid).set({
      name: user.displayName,
      email: user.email,
      lastLogin: new Date()
    }, { merge: true });

    // Load chat memory
    loadMemory(user.uid);

    document.getElementById("status").innerText =
      "✅ Logged in as " + user.displayName;
  }

  // 📚 LOAD MEMORY
  function loadMemory(uid) {
    db.collection("chats").doc(uid).get()
      .then(doc => {
        if (!doc.exists) {
          db.collection("chats").doc(uid).set({
            messages: []
          });
        } else {
          console.log("🧠 Memory loaded:", doc.data());
        }
      });
  }

  // 💬 SAVE MESSAGE (FOR FUTURE AI USE)
  function saveMessage(role, text) {
    if (!currentUser) return;

    const ref = db.collection("chats").doc(currentUser.uid);

    ref.get().then(doc => {
      let messages = [];

      if (doc.exists) {
        messages = doc.data().messages || [];
      }

      messages.push({
        role: role,
        text: text,
        time: new Date()
      });

      ref.set({ messages: messages }, { merge: true });
    });
  }

  // 🔍 LOGIN STATE TRACKER
  auth.onAuthStateChanged(user => {
    if (user) {
      handleUser(user);
    } else {
      currentUser = null;
      document.getElementById("status").innerText =
        "❌ Not logged in";
    }
  });
</script>

<!-- 🤖 GUARDIAN AI CHAT WIDGET -->
<script>
(function(){
  if(!window.chatbase||window.chatbase("getState")!=="initialized"){
    window.chatbase=(...args)=>{
      if(!window.chatbase.q){window.chatbase.q=[]}
      window.chatbase.q.push(args)
    };

    window.chatbase=new Proxy(window.chatbase,{
      get(target,prop){
        if(prop==="q"){return target.q}
        return(...args)=>target(prop,...args)
      }
    })
  }

  const onLoad=function(){
    const script=document.createElement("script");
    script.src="https://www.chatbase.co/embed.min.js";
    script.id="BJAUIH5Icn_jSA9SiDX9N";
    script.domain="www.chatbase.co";
    document.body.appendChild(script)
  };

  if(document.readyState==="complete"){
    onLoad()
  } else {
    window.addEventListener("load",onLoad)
  }
})();
</script>

</body>
</html>
