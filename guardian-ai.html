<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI</title>
    <script src="https://kjur.github.io/jsrsasign/jsrsasign-all-min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .card { background: #1e293b; padding: 20px; margin: 20px; border-radius: 12px; border: 1px solid #00ffcc; }
        .btn { background: #ff4d4d; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header style="padding: 20px; background: rgba(0,0,0,0.4);">
    <h1 style="color: #00ffcc;">🛡 Guardian AI</h1>
</header>

<div class="card">
    <div id="user-info">Authenticating...</div>
    <button class="btn" onclick="firebase.auth().signOut()">Sign Out</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
        authDomain: "my-website-357cb.firebaseapp.com",
        projectId: "my-website-357cb",
        storageBucket: "my-website-357cb.firebasestorage.app",
        messagingSenderId: "759627961944",
        appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };
    firebase.initializeApp(firebaseConfig);

    // --- YOUR SECRET FROM DASHBOARD ---
    // IMPORTANT: Keep this secret in a real app!
    const CHATBASE_SECRET = "w7bier3nj5zch42iubt7gicm3cgb05h1"; 

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.getElementById('user-info').innerText = "Logged in: " + user.email;

            // --- CREATE THE JWT (THE SERVER CODE) ---
            const header = { alg: "HS256", typ: "JWT" };
            const payload = {
                user_id: user.uid,
                email: user.email,
                iat: Math.floor(Date.now() / 1000),
                exp: Math.floor(Date.now() / 1000) + (60 * 60) // 1 hour
            };
            
            // Signing the token
            const sHeader = JSON.stringify(header);
            const sPayload = JSON.stringify(payload);
            const token = KJUR.jws.JWS.sign("HS256", sHeader, sPayload, CHATBASE_SECRET);

            // --- IDENTIFY TO CHATBASE ---
            const checkChat = setInterval(() => {
                if (window.chatbase) {
                    clearInterval(checkChat);
                    window.chatbase('identify', { token: token });
                    console.log("✅ Identity Verified with JWT");
                }
            }, 1000);

        } else {
            if (window.chatbase) window.chatbase('resetUser');
            window.location.href = "login.html";
        }
    });
</script>

<script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="BJAUIH5Icn_jSA9SiDX9N";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
</script>

</body>
</html>
