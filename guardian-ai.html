<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guardian AI</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
}

h1 { color:#00ffcc; }

/* CHAT BOX */
.container {
  max-width:700px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:15px;
}

#chat {
  height:300px;
  overflow-y:auto;
  border:1px solid #334155;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:75%;
  padding:10px;
  border:none;
  border-radius:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00ffcc;
  font-weight:bold;
}

.logout {
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>🤖 Guardian AI</h1>
  <p>Secure AI + Memory System</p>
</header>

<div class="container">

  <h3 id="welcome">Loading user...</h3>

  <button class="logout" onclick="logout()">🚪 Logout</button>

  <div id="chat"></div>

  <input id="msg" placeholder="Ask Guardian AI..." />
  <button onclick="sendMsg()">Send</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
  authDomain: "my-website-357cb.firebaseapp.com",
  projectId: "my-website-357cb",
  storageBucket: "my-website-357cb.firebasestorage.app",
  messagingSenderId: "759627961944",
  appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const uid = localStorage.getItem("guardian_uid");

// 🚫 BLOCK IF NOT LOGGED IN
if (!uid) {
  alert("Please login first 🛡️");
  window.location.href = "login.html";
}

// 🧠 LOAD USER INFO
db.collection("users").doc(uid).get().then(doc => {
  if (doc.exists) {
    document.getElementById("welcome").innerText =
      "Welcome " + doc.data().name;
  } else {
    document.getElementById("welcome").innerText =
      "Welcome Guardian User";
  }
});

// 💬 LOAD CHAT HISTORY
loadChat();

function loadChat() {
  db.collection("chats").doc(uid).get().then(doc => {
    if (doc.exists) {
      const msgs = doc.data().messages || [];
      msgs.forEach(m => addMsg(m.role, m.text));
    } else {
      db.collection("chats").doc(uid).set({ messages: [] });
    }
  });
}

// 💬 SEND MESSAGE
function sendMsg() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  addMsg("you", text);
  saveMsg("user", text);

  input.value = "";

  setTimeout(() => {
    const reply = "🤖 Guardian AI: I received your message.";
    addMsg("ai", reply);
    saveMsg("ai", reply);
  }, 800);
}

// 🧠 ADD MESSAGE
function addMsg(role, text) {
  const chat = document.getElementById("chat");

  const p = document.createElement("p");
  p.innerHTML = `<b>${role}:</b> ${text}`;

  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

// 💾 SAVE MEMORY
function saveMsg(role, text) {
  const ref = db.collection("chats").doc(uid);

  ref.get().then(doc => {
    let messages = doc.exists ? doc.data().messages : [];

    messages.push({
      role,
      text,
      time: new Date()
    });

    if (messages.length > 100) messages = messages.slice(-100);

    ref.set({ messages }, { merge:true });
  });
}

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("guardian_uid");
  window.location.href = "login.html";
}
</script>

</body>
</html>
