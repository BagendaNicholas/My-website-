<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI - Mobile Sync</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        header { padding: 20px; background: rgba(0,0,0,0.4); }
        h1 { color: #00ffcc; }
        .status-card { background: #1e293b; padding: 20px; margin: 20px; border-radius: 12px; border: 1px solid #00ffcc; }
        .btn-logout { background: #ff4d4d; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🤖 Guardian AI</h1>
</header>

<div class="status-card">
    <div id="user-info">Checking User...</div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
        authDomain: "my-website-357cb.firebaseapp.com",
        projectId: "my-website-357cb",
        storageBucket: "my-website-357cb.firebasestorage.app",
        messagingSenderId: "759627961944",
        appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 🔐 HANDLE AUTH CHANGES
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('user-info').innerHTML = `Logged in: ${user.email}`;
            
            // Wait for Chatbase to be ready then SYNC the user
            const waitForChat = setInterval(() => {
                if (window.chatbase) {
                    clearInterval(waitForChat);
                    window.chatbase('identify', {
                        userId: user.uid, // This switches the conversation history!
                        email: user.email
                    });
                }
            }, 1000);
        } else {
            // If logged out, CLEAR the chatbot history so the next person can't see it
            if (window.chatbase) {
                window.chatbase('resetUser');
            }
            window.location.href = "login.html";
        }
    });

    function logout() {
        auth.signOut();
    }
</script>

<script>
    (function(){
        if(!window.chatbase||window.chatbase("getState")!=="initialized"){
            window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};
            window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})
        }
        const onLoad=function(){
            const script=document.createElement("script");
            script.src="https://www.chatbase.co/embed.min.js";
            script.id="BJAUIH5Icn_jSA9SiDX9N";
            script.domain="www.chatbase.co";
            document.body.appendChild(script)
        };
        if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}
    })();
</script>

</body>
</html>
