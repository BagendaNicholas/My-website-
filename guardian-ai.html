<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI - Secure Terminal Sync</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid #00ffcc;
        }
        h1 { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .info-card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .btn-signout {
            background: none;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🤖 Guardian AI</h1>
    <p>User Identity: <span id="sync-status">Syncing...</span></p>
</div>

<div class="info-card">
    <div id="user-display">Waiting for Firebase...</div>
    <div style="margin-top:10px;">
        <span id="dot" class="status-dot"></span>
        <small id="termux-status">Termux Server: Connecting...</small>
    </div>
</div>

<button class="btn-signout" onclick="handleLogout()">Sign Out of All Sessions</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
        authDomain: "my-website-357cb.firebaseapp.com",
        projectId: "my-website-357cb",
        storageBucket: "my-website-357cb.firebasestorage.app",
        messagingSenderId: "759627961944",
        appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    async function handleLogout() {
        if (window.chatbase) window.chatbase('resetUser');
        await auth.signOut();
        window.location.href = "login.html";
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('user-display').innerText = "Account: " + user.email;
            
            try {
                // Request Token from Termux
                const response = await fetch('http://localhost:3000/get-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.uid, email: user.email })
                });

                const data = await response.json();
                
                if (data.token && window.chatbase) {
                    window.chatbase('identify', { token: data.token });
                    document.getElementById('termux-status').innerText = "Termux Server: Online";
                    document.getElementById('dot').className = "status-dot online";
                    document.getElementById('sync-status').innerText = "Verified ✅";
                }
            } catch (err) {
                document.getElementById('termux-status').innerText = "Termux Server: Offline (Check App)";
                console.error("Connection error:", err);
            }
        } else {
            if (!window.location.pathname.includes('login.html')) {
                window.location.href = "login.html";
            }
        }
    });
</script>

<script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="BJAUIH5Icn_jSA9SiDX9N";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
</script>

</body>
</html>
