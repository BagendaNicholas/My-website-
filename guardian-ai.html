<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI - Test Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        header {
            padding: 20px;
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 10px rgba(0,255,200,0.3);
        }

        h1 {
            margin: 10px 0;
            color: #00ffcc;
        }

        p {
            color: #cbd5e1;
        }

        .box {
            margin-top: 30px;
            padding: 20px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #00ffcc;
        }
    </style>
</head>

<body>

<header>
    <h1>🤖 Guardian AI</h1>
    <p>Created by Nicholas & Big Bro Grayson</p>
</header>

<div class="box">
    <h2>Welcome to the Test Page</h2>
    <div id="user-info" class="status-card">Checking authentication...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    // Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
        authDomain: "my-website-357cb.firebaseapp.com",
        projectId: "my-website-357cb",
        storageBucket: "my-website-357cb.firebasestorage.app",
        messagingSenderId: "759627961944",
        appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 🔐 MONITOR AUTH & IDENTIFY USER
    auth.onAuthStateChanged(user => {
        const infoBox = document.getElementById('user-info');
        
        if (!user) {
            // No user is signed in.
            infoBox.innerHTML = "❌ Not logged in. Redirecting...";
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        } else {
            // User is signed in
            infoBox.innerHTML = `✅ Logged in as: <b>${user.email}</b>`;
            console.log("User UID:", user.uid);

            // Tell Chatbase who this user is
            if (window.chatbase) {
                window.chatbase('identify', {
                    userId: user.uid,
                    email: user.email,
                    name: user.displayName || "Guardian User"
                });
                console.log("🤖 Chatbase session synced to UID:", user.uid);
            }
        }
    });
</script>

<script>
    (function(){
        if(!window.chatbase||window.chatbase("getState")!=="initialized"){
            window.chatbase=(...arguments)=>{
                if(!window.chatbase.q){window.chatbase.q=[]}
                window.chatbase.q.push(arguments)
            };
            window.chatbase=new Proxy(window.chatbase,{
                get(target,prop){
                    if(prop==="q"){return target.q}
                    return(...args)=>target(prop,...args)
                }
            })
        }
        const onLoad=function(){
            const script=document.createElement("script");
            script.src="https://www.chatbase.co/embed.min.js";
            script.id="BJAUIH5Icn_jSA9SiDX9N"; // Your Chatbot ID
            script.domain="www.chatbase.co";
            document.body.appendChild(script)
        };
        if(document.readyState==="complete"){
            onLoad()
        } else {
            window.addEventListener("load",onLoad)
        }
    })();
</script>

</body>
</html>
