<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guardian Dashboard 🛡️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 28px;
}

/* GRID */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
}

/* BUTTONS */
button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* TEXT */
h2 {
  margin-bottom: 10px;
}

.weather-box, .quote-box {
  margin-top: 10px;
}

.news-item {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="header">
  <h1>🛡️ Guardian Dashboard</h1>
  <p>Your smart assistant</p>
</div>

<div class="dashboard">

  <!-- WEATHER -->
  <div class="card">
    <h2>🌦️ Weather</h2>

    <input type="text" id="cityInput" placeholder="Enter city...">

    <button onclick="getWeatherByCity()">Search</button>
    <button onclick="getLocationWeather()">📍 Location</button>

    <div class="weather-box" id="weatherResult"></div>
  </div>

  <!-- NEWS -->
  <div class="card">
    <h2>📰 News</h2>

    <button onclick="getNews()">Load News</button>

    <div id="news"></div>
  </div>

  <!-- QUOTES -->
  <div class="card">
    <h2>💬 Motivation</h2>

    <button onclick="getQuote()">New Quote</button>

    <div class="quote-box">
      <p id="quote"></p>
      <p id="author"></p>
    </div>
  </div>

</div>

<script>
const weatherKey = "052d73c4917c6fde5a0191ab1ec6b0af";
const newsKey = "4de6fd9fd2db4d558c186354398e99d3";

// WEATHER
function getWeatherByCity() {
  const city = document.getElementById("cityInput").value;

  fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${weatherKey}&units=metric`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("weatherResult").innerHTML = `
        <h3>${data.name}</h3>
        <p>🌡️ ${data.main.temp}°C</p>
        <p>☁️ ${data.weather[0].description}</p>
      `;
    });
}

function getLocationWeather() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${weatherKey}&units=metric`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("weatherResult").innerHTML = `
          <h3>${data.name}</h3>
          <p>🌡️ ${data.main.temp}°C</p>
          <p>☁️ ${data.weather[0].description}</p>
        `;
      });
  });
}

// NEWS
function getNews() {
  fetch(`https://newsapi.org/v2/top-headlines?country=us&apiKey=${newsKey}`)
    .then(res => res.json())
    .then(data => {
      let output = "";

      data.articles.slice(0,5).forEach(article => {
        output += `
          <div class="news-item">
            <h4>${article.title}</h4>
            <a href="${article.url}" target="_blank" style="color:#00c6ff;">Read more</a>
          </div>
        `;
      });

      document.getElementById("news").innerHTML = output;
    });
}

// QUOTES
function getQuote() {
  fetch("https://api.quotable.io/random")
    .then(res => res.json())
    .then(data => {
      document.getElementById("quote").innerText = `"${data.content}"`;
      document.getElementById("author").innerText = `— ${data.author}`;
    });
}

// AUTO LOAD
getQuote();
</script>

</body>
  </html>
