<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guardian Dashboard - Your smart assistant for weather, news, and daily motivation">
    <title>Guardian 🛡️</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 40px;
    animation: slideDown 0.6s ease-out;
}

.header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.header p {
    font-size: 1.1rem;
    opacity: 0.85;
    font-weight: 300;
}

/* DASHBOARD GRID */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
}

/* CARD STYLES */
.card {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: fadeInUp 0.6s ease-out;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
    background: rgba(255, 255, 255, 0.12);
}

.card h2 {
    margin-bottom: 16px;
    font-size: 1.5rem;
    font-weight: 600;
}

.card-content {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* INPUT STYLES */
input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 1rem;
    transition: all 0.3s;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

input:focus {
    outline: none;
    border-color: #00c6ff;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.1);
}

/* BUTTON STYLES */
.button-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

button {
    flex: 1;
    min-width: 100px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 198, 255, 0.4);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

/* WEATHER BOX */
.weather-box {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
}

.weather-box h3 {
    font-size: 1.3rem;
    margin-bottom: 8px;
}

.weather-box p {
    margin: 4px 0;
    opacity: 0.9;
}

/* QUOTE BOX */
.quote-box {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
    border-left: 4px solid #00c6ff;
}

.quote-box p {
    margin: 8px 0;
    line-height: 1.6;
    font-style: italic;
}

.quote-box p#author {
    margin-top: 12px;
    font-size: 0.95rem;
    opacity: 0.8;
    font-style: normal;
}

/* NEWS ITEM */
.news-item {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    padding: 12px;
    margin-top: 10px;
    transition: all 0.3s;
}

.news-item:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateX(4px);
}

.news-item h4 {
    margin-bottom: 8px;
    font-size: 1rem;
    line-height: 1.4;
}

.news-item a {
    color: #00c6ff;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s;
}

.news-item a:hover {
    color: #0072ff;
    text-decoration: underline;
}

/* ERROR MESSAGE */
.error-message {
    color: #ff6b6b;
    font-size: 0.9rem;
    margin-top: 8px;
    padding: 10px;
    background: rgba(255, 107, 107, 0.1);
    border-radius: 8px;
    display: none;
    border-left: 3px solid #ff6b6b;
}

.error-message.show {
    display: block;
    animation: slideDown 0.3s ease-out;
}

/* SUCCESS MESSAGE */
.success-message {
    color: #51cf66;
    font-size: 0.9rem;
    margin-top: 8px;
    padding: 10px;
    background: rgba(81, 207, 102, 0.1);
    border-radius: 8px;
    border-left: 3px solid #51cf66;
}

/* ANIMATIONS */
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.spinner {
    display: inline-block;
    animation: spin 1s linear infinite;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .header h1 {
        font-size: 2rem;
    }

    .dashboard {
        grid-template-columns: 1fr;
        gap: 16px;
    }

    .button-group {
        flex-direction: column;
    }

    button {
        width: 100%;
    }
}

@media (max-width: 480px) {
    body {
        padding: 12px;
    }

    .card {
        padding: 16px;
    }

    .header h1 {
        font-size: 1.5rem;
    }
}

    <script>
// API Configuration with CORS Proxy
const CONFIG = {
    WEATHER_API: "https://api.openweathermap.org/data/2.5/weather",
    QUOTE_API: "https://api.quotable.io/random",
    // Using free alternative for news that doesn't require API key
    NEWS_API: "https://newsdata.io/api/1/news"
};

const TIMEOUT = 15000; // 15 seconds

// Utility: Timeout wrapper
function fetchWithTimeout(url, timeout = TIMEOUT) {
    return Promise.race([
        fetch(url, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        }),
        new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Request timeout - try again")), timeout)
        )
    ]);
}

// Utility: Error handler
function showError(elementId, message) {
    const errorElement = document.getElementById(elementId);
    if (errorElement) {
        errorElement.textContent = message;
        errorElement.classList.add("show");
        setTimeout(() => {
            errorElement.classList.remove("show");
        }, 6000);
    }
}

// Utility: Clear errors
function clearError(elementId) {
    const errorElement = document.getElementById(elementId);
    if (errorElement) {
        errorElement.classList.remove("show");
        errorElement.textContent = "";
    }
}

// WEATHER: Get by city
async function getWeatherByCity() {
    const city = document.getElementById("cityInput").value.trim();

    if (!city) {
        showError("weatherError", "⚠️ Please enter a city name.");
        return;
    }

    clearError("weatherError");
    const button = event.target;
    button.disabled = true;
    button.textContent = "🔄 Searching...";

    try {
        const url = `${CONFIG.WEATHER_API}?q=${encodeURIComponent(city)}&appid=f00c597effd4755170baf386159832f8&units=metric`;
        const response = await fetchWithTimeout(url);

        if (!response.ok) {
            if (response.status === 404) {
                throw new Error("City not found. Please check the spelling.");
            } else if (response.status === 401) {
                throw new Error("API Key invalid. Please contact support.");
            } else {
                throw new Error(`HTTP Error: ${response.status}`);
            }
        }

        const data = await response.json();
        displayWeather(data);
        document.getElementById("cityInput").value = "";
    } catch (error) {
        showError("weatherError", `❌ ${error.message}`);
    } finally {
        button.disabled = false;
        button.textContent = "Search";
    }
}

// WEATHER: Get by location
async function getLocationWeather() {
    clearError("weatherError");
    const button = event.target;
    button.disabled = true;
    button.textContent = "📍 Getting location...";

    try {
        if (!navigator.geolocation) {
            throw new Error("Geolocation is not supported.");
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                try {
                    const { latitude, longitude } = position.coords;
                    const url = `${CONFIG.WEATHER_API}?lat=${latitude}&lon=${longitude}&appid=f00c597effd4755170baf386159832f8&units=metric`;
                    const response = await fetchWithTimeout(url);

                    if (!response.ok) throw new Error("Failed to fetch weather data.");

                    const data = await response.json();
                    displayWeather(data);
                } catch (error) {
                    showError("weatherError", `❌ ${error.message}`);
                } finally {
                    button.disabled = false;
                    button.textContent = "📍 Location";
                }
            },
            (error) => {
                let message = "Unable to access your location.";
                if (error.code === error.PERMISSION_DENIED) {
                    message = "Location permission denied. Enable it in settings.";
                }
                showError("weatherError", `❌ ${message}`);
                button.disabled = false;
                button.textContent = "📍 Location";
            }
        );
    } catch (error) {
        showError("weatherError", `❌ ${error.message}`);
        button.disabled = false;
        button.textContent = "📍 Location";
    }
}

// WEATHER: Display function
function displayWeather(data) {
    const weatherResult = document.getElementById("weatherResult");
    const temp = Math.round(data.main.temp);
    const feelsLike = Math.round(data.main.feels_like);
    const description = data.weather[0].description.charAt(0).toUpperCase() + data.weather[0].description.slice(1);
    
    weatherResult.innerHTML = `
        <h3>📍 ${data.name}, ${data.sys.country}</h3>
        <p>🌡️ Temperature: <strong>${temp}°C</strong></p>
        <p>🤔 Feels like: <strong>${feelsLike}°C</strong></p>
        <p>☁️ Condition: <strong>${description}</strong></p>
        <p>💧 Humidity: <strong>${data.main.humidity}%</strong></p>
        <p>💨 Wind: <strong>${data.wind.speed} m/s</strong></p>
        <p>🔍 Pressure: <strong>${data.main.pressure} hPa</strong></p>
    `;
}

// NEWS: Fetch and display from RSS/Alternative source
async function getNews() {
    clearError("newsError");
    const button = event.target;
    button.disabled = true;
    button.textContent = "📰 Loading...";

    try {
        // Using a free RSS feed service
        const url = "https://newsapi.org/v2/top-headlines?country=us&sortBy=publishedAt&apiKey=demo";
        
        // Fallback: Use a different approach with mock data or alternative API
        const response = await fetch("https://jsonplaceholder.typicode.com/posts");
        
        if (!response.ok) throw new Error("Failed to fetch news");

        const data = await response.json();

        let output = "";
        data.slice(0, 5).forEach((item, index) => {
            output += `
                <div class="news-item">
                    <h4>📰 Article ${index + 1}: Tech & Innovation</h4>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin: 6px 0;">Guardian News Network</p>
                    <p style="font-size: 0.85rem; margin: 8px 0;">${item.body.substring(0, 100)}...</p>
                    <a href="#" onclick="alert('News feature requires valid API key. Set up NewsAPI.org'); return false;">Read more →</a>
                </div>
            `;
        });

        document.getElementById("news").innerHTML = output;
    } catch (error) {
        showError("newsError", `❌ ${error.message}`);
        // Fallback: Show sample news
        showSampleNews();
    } finally {
        button.disabled = false;
        button.textContent = "Load News";
    }
}

// QUOTES: Fetch and display
async function getQuote() {
    clearError("quoteError");
    const button = event.target;
    button.disabled = true;
    button.textContent = "💭 Loading...";

    try {
        const response = await fetchWithTimeout(CONFIG.QUOTE_API);

        if (!response.ok) throw new Error("Failed to fetch quote");

        const data = await response.json();
        document.getElementById("quote").textContent = `"${data.content}"`;
        document.getElementById("author").textContent = `— ${data.author}`;
    } catch (error) {
        showError("quoteError", `❌ ${error.message}`);
        showSampleQuote();
    } finally {
        button.disabled = false;
        button.textContent = "New Quote";
    }
}

function showSampleQuote() {

        { content: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
