<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guardian Dashboard - Your smart assistant for weather, news, and daily motivation">
    <title>Guardian Dashboard 🛡️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.85;
            font-weight: 300;
        }

        /* DASHBOARD GRID */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* CARD STYLES */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .card h2 {
            margin-bottom: 16px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* INPUT STYLES */
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            outline: none;
            border-color: #00c6ff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(0, 198, 255, 0.1);
        }

        /* BUTTON STYLES */
        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 198, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* WEATHER BOX */
        .weather-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }

        /* QUOTE BOX */
        .quote-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            border-left: 4px solid #00c6ff;
            min-height: 80px;
        }

        .quote-box p#quote {
            font-style: italic;
            line-height: 1.4;
        }

        .quote-box p#author {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* NEWS ITEM */
        .news-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        /* ERROR MESSAGE */
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 8px;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            display: none;
            border-left: 3px solid #ff6b6b;
        }

        .error-message.show {
            display: block;
        }

        /* ANIMATIONS */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Guardian Dashboard</h1>
        <p>Your smart assistant</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🌦️ Weather</h2>
            <div class="card-content">
                <input type="text" id="cityInput" placeholder="Enter city name..." aria-label="City search">
                <div class="button-group">
                    <button onclick="getWeatherByCity(event)">Search</button>
                    <button onclick="getLocationWeather(event)">📍 Location</button>
                </div>
                <div id="weatherResult"></div>
                <div id="weatherError" class="error-message"></div>
            </div>
        </div>

        <div class="card">
            <h2>📰 News</h2>
            <div class="card-content">
                <button onclick="getNews(event)">Load News</button>
                <div id="news"></div>
                <div id="newsError" class="error-message"></div>
            </div>
        </div>

        <div class="card">
            <h2>💬 Motivation</h2>
            <div class="card-content">
                <button onclick="getQuote(event)">New Quote</button>
                <div class="quote-box">
                    <p id="quote">Click the button for motivation...</p>
                    <p id="author"></p>
                </div>
                <div id="quoteError" class="error-message"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            WEATHER_API: "https://api.openweathermap.org/data/2.5/weather",
            // Using a CORS proxy for the Quote API to avoid blocked requests
            QUOTE_API: "https://api.allorigins.win/get?url=" + encodeURIComponent("https://zenquotes.io/api/random"),
            WEATHER_KEY: "f00c597effd4755170baf386159832f8"
        };

        // Utility: Error handling
        function showError(elementId, message) {
            const err = document.getElementById(elementId);
            err.textContent = message;
            err.classList.add("show");
            setTimeout(() => err.classList.remove("show"), 5000);
        }

        function clearError(elementId) {
            document.getElementById(elementId).classList.remove("show");
        }

        // WEATHER
        async function getWeatherByCity(e) {
            const city = document.getElementById("cityInput").value.trim();
            if (!city) return showError("weatherError", "Please enter a city.");

            const btn = e.target;
            btn.disabled = true;
            btn.textContent = "Loading...";

            try {
                const res = await fetch(`${CONFIG.WEATHER_API}?q=${city}&appid=${CONFIG.WEATHER_KEY}&units=metric`);
                if (!res.ok) throw new Error("City not found.");
                const data = await res.json();
                displayWeather(data);
            } catch (err) {
                showError("weatherError", err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Search";
            }
        }

        async function getLocationWeather(e) {
            if (!navigator.geolocation) return showError("weatherError", "Geolocation not supported.");
            
            const btn = e.target;
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const { latitude, longitude } = pos.coords;
                    const res = await fetch(`${CONFIG.WEATHER_API}?lat=${latitude}&lon=${longitude}&appid=${CONFIG.WEATHER_KEY}&units=metric`);
                    const data = await res.json();
                    displayWeather(data);
                } catch (err) {
                    showError("weatherError", "Failed to get weather.");
                } finally {
                    btn.disabled = false;
                }
            }, () => {
                showError("weatherError", "Location access denied.");
                btn.disabled = false;
            });
        }

        function displayWeather(data) {
            document.getElementById("weatherResult").innerHTML = `
                <div class="weather-box">
                    <h3>${data.name}</h3>
                    <p>Temp: ${Math.round(data.main.temp)}°C</p>
                    <p>Condition: ${data.weather[0].main}</p>
                </div>
            `;
        }

        // QUOTES
        async function getQuote(e) {
            const btn = e ? e.target : null;
            if (btn) btn.disabled = true;

            try {
                const res = await fetch(CONFIG.QUOTE_API);
                const data = await res.json();
                const quoteObj = JSON.parse(data.contents)[0];
                document.getElementById("quote").textContent = `"${quoteObj.q}"`;
                document.getElementById("author").textContent = `— ${quoteObj.a}`;
            } catch (err) {
                document.getElementById("quote").textContent = "The best way to predict the future is to create it.";
                document.getElementById("author").textContent = "— Peter Drucker";
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // NEWS
        function getNews(e) {
            const btn = e.target;
            btn.disabled = true;
            btn.textContent = "Fetching...";
            
            // Simulating news fetch due to API key restrictions in browsers
            setTimeout(() => {
                const newsItems = [
                    { title: "Tech Trends 2026", desc: "AI continues to integrate into daily workflows." },
                    { title: "Global Economy", desc: "New trade agreements signed today." }
                ];
                document.getElementById("news").innerHTML = newsItems.map(n => `
                    <div class="news-item">
                        <h4>${n.title}</h4>
                        <p style="font-size: 0.8rem; opacity: 0.8;">${n.desc}</p>
                    </div>
                `).join("");
                btn.disabled = false;
                btn.textContent = "Load News";
            }, 1000);
        }

        // Init
        window.onload = () => getQuote();
    </script>
</body>
</html>
