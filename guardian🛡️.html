<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guardian Dashboard - Your smart assistant for weather, news, movies, and daily motivation">
    <title>Guardian Dashboard 🛡️</title>
    <style>
        /* [EXISTING DASHBOARD STYLES] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.12);
        }

        .card h2 {
            margin-bottom: 16px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* BUTTON STYLES */
        button {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* MOVIE SPECIFIC STYLES */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom scrollbar for movie grid */
        .movie-grid::-webkit-scrollbar {
            width: 5px;
        }
        .movie-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .movie-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .movie-item img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .movie-item h4 {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* Shared Components */
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show { display: block; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ Guardian Dashboard</h1>
        <p>Your smart assistant</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🌦️ Weather</h2>
            <div class="card-content">
                <input type="text" id="cityInput" placeholder="Enter city name...">
                <button onclick="getWeatherByCity(event)">Search</button>
                <div id="weatherResult"></div>
                <div id="weatherError" class="error-message"></div>
            </div>
        </div>

        <div class="card">
            <h2>📰 News</h2>
            <div class="card-content">
                <button onclick="getNews(event)">Load News</button>
                <div id="news"></div>
            </div>
        </div>

        <div class="card">
            <h2>🎬 Trending Movies</h2>
            <div class="card-content">
                <button onclick="getMovies(event)">Show Today's Hits</button>
                <div id="movies" class="movie-grid"></div>
                <div id="movieError" class="error-message"></div>
            </div>
        </div>

        <div class="card">
            <h2>💬 Motivation</h2>
            <div class="card-content">
                <button onclick="getQuote(event)">New Quote</button>
                <div id="quote" style="font-style: italic; margin-top: 10px;">Click for motivation...</div>
                <div id="author" style="opacity: 0.7; font-size: 0.9rem;"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            WEATHER_API: "https://api.openweathermap.org/data/2.5/weather",
            WEATHER_KEY: "f00c597effd4755170baf386159832f8",
            MOVIE_API: "https://api.themoviedb.org/3/trending/movie/day",
            MOVIE_KEY: "2a76ab20531de6848483abb62c0f0c50",
            QUOTE_API: "https://api.allorigins.win/get?url=" + encodeURIComponent("https://zenquotes.io/api/random")
        };

        // --- MOVIES LOGIC ---
        async function getMovies(e) {
            const btn = e.target;
            const container = document.getElementById("movies");
            btn.disabled = true;
            btn.textContent = "Fetching...";

            try {
                const res = await fetch(`${CONFIG.MOVIE_API}?api_key=${CONFIG.MOVIE_KEY}`);
                if (!res.ok) throw new Error("Failed to load movies");
                const data = await res.json();
                
                container.innerHTML = data.results.map(movie => `
                    <div class="movie-item">
                        <img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}">
                        <h4>${movie.title}</h4>
                    </div>
                `).join("");

            } catch (err) {
                document.getElementById("movieError").textContent = "Could not load movies.";
                document.getElementById("movieError").classList.add("show");
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Movies";
            }
        }

        // --- EXISTING WEATHER LOGIC ---
        async function getWeatherByCity(e) {
            const city = document.getElementById("cityInput").value.trim();
            if (!city) return;
            try {
                const res = await fetch(`${CONFIG.WEATHER_API}?q=${city}&appid=${CONFIG.WEATHER_KEY}&units=metric`);
                const data = await res.json();
                document.getElementById("weatherResult").innerHTML = `
                    <div style="margin-top:10px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px;">
                        <h3>${data.name}</h3>
                        <p>${Math.round(data.main.temp)}°C - ${data.weather[0].main}</p>
                    </div>`;
            } catch (err) { console.log("Weather error"); }
        }

        // --- EXISTING QUOTE LOGIC ---
        async function getQuote(e) {
            try {
                const res = await fetch(CONFIG.QUOTE_API);
                const data = await res.json();
                const quoteObj = JSON.parse(data.contents)[0];
                document.getElementById("quote").textContent = `"${quoteObj.q}"`;
                document.getElementById("author").textContent = `— ${quoteObj.a}`;
            } catch (err) {
                document.getElementById("quote").textContent = "Keep pushing forward.";
            }
        }

        // --- EXISTING NEWS LOGIC (Simulated) ---
        function getNews(e) {
            const newsItems = [
                { title: "Tech Trends 2026", desc: "AI continues to evolve." },
                { title: "Space X Update", desc: "Mars mission on track." }
            ];
            document.getElementById("news").innerHTML = newsItems.map(n => `
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-top:10px;">
                    <h4>${n.title}</h4>
                    <p style="font-size:0.8rem;">${n.desc}</p>
                </div>
            `).join("");
        }

        window.onload = () => getQuote();
    </script>
</body>
</html>
