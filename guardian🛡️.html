<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Dashboard Pro 🛡️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        h2 { margin-bottom: 15px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        /* UI ELEMENTS */
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 10px;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }

        /* NEWS STYLES */
        #newsContent {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .news-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            transform: translateX(5px);
        }

        .news-item h4 { font-size: 0.95rem; margin-bottom: 5px; line-height: 1.3; color: #60a5fa; }
        .news-item p { font-size: 0.8rem; opacity: 0.7; }
        .news-item span { font-size: 0.7rem; color: #94a3b8; display: block; margin-top: 8px; }

        /* MOVIE GRID */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-height: 450px;
            overflow-y: auto;
        }
        .movie-item {
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
        }
        .movie-item img { width: 100%; border-radius: 5px; margin-bottom: 5px; }

        /* MODAL */
        #videoModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-inner { width: 90%; max-width: 800px; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; background: red; }

        /* QUOTE INSIGHT */
        .insight-line {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ Guardian Dashboard Pro</h1>
        <p id="locationDisplay">Detecting your location...</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🌦️ Local Weather</h2>
            <div id="weatherContent">Loading local weather...</div>
        </div>

        <div class="card">
            <h2>📰 Global News</h2>
            <select id="newsCategory" onchange="getNews()">
                <option value="World">World News</option>
                <option value="Technology">Technology</option>
                <option value="Business">Business</option>
                <option value="Science">Science</option>
                <option value="Health">Health</option>
            </select>
            <div id="newsContent">Fetching latest posts...</div>
        </div>

        <div class="card">
            <h2>🎬 Movie Finder</h2>
            <input type="text" id="movieSearch" placeholder="Search for a movie..." onkeyup="if(event.key === 'Enter') searchMovies()">
            <button onclick="searchMovies()">Search</button>
            <div id="movieResults" class="movie-grid"></div>
        </div>

        <div class="card">
            <h2>💬 Daily Motivation</h2>
            <div id="quoteArea">
                <p id="quoteText" style="font-size: 1.1rem; line-height: 1.4;"></p>
                <p id="quoteAuthor" style="color: #3b82f6; margin-top: 5px;"></p>
                <div id="quoteInsight" class="insight-line"></div>
            </div>
            <button onclick="getQuote()" style="margin-top: 15px;">New Wisdom</button>
        </div>
    </div>

    <div id="videoModal">
        <div class="modal-inner">
            <button class="close-btn" onclick="closeModal()">Close</button>
            <div id="videoPlayer" style="aspect-ratio: 16/9;"></div>
        </div>
    </div>

    <script>
        const API_KEY_MOVIE = "2a76ab20531de6848483abb62c0f0c50";
        const API_KEY_WEATHER = "f00c597effd4755170baf386159832f8";

        // 1. AUTO WEATHER
        function initWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY_WEATHER}&units=metric`);
                    const data = await res.json();
                    document.getElementById("locationDisplay").textContent = `Currently in ${data.name}`;
                    document.getElementById("weatherContent").innerHTML = `
                        <div style="text-align:center;">
                            <h3 style="font-size:2.5rem;">${Math.round(data.main.temp)}°C</h3>
                            <p>${data.weather[0].description.toUpperCase()}</p>
                            <p>Humidity: ${data.main.humidity}% | Wind: ${data.wind.speed} m/s</p>
                        </div>`;
                }, () => {
                    document.getElementById("weatherContent").textContent = "Location access denied.";
                });
            }
        }

        // 2. LIVE CLICKABLE NEWS
        async function getNews() {
            const category = document.getElementById("newsCategory").value;
            const content = document.getElementById("newsContent");
            content.innerHTML = "Fetching latest stories...";

            try {
                // Using a public RSS-to-JSON tool for live data
                const rssUrl = `https://news.google.com/rss/search?q=${category}&hl=en-US&gl=US&ceid=US:en`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // Parse the XML string into a DOM object
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                let html = "";
                // Limit to 10 items
                for (let i = 0; i < 10; i++) {
                    const item = items[i];
                    if (!item) break;

                    const title = item.querySelector("title").innerHTML;
                    const link = item.querySelector("link").innerHTML;
                    const pubDate = new Date(item.querySelector("pubDate").innerHTML).toLocaleDateString();

                    html += `
                        <a href="${link}" target="_blank" class="news-item">
                            <h4>${title}</h4>
                            <span>Published: ${pubDate}</span>
                        </a>
                    `;
                }
                content.innerHTML = html;

            } catch (err) {
                content.innerHTML = "Error loading news. Try again later.";
                console.error(err);
            }
        }

        // 3. MOVIE SEARCH
        async function searchMovies() {
            const query = document.getElementById("movieSearch").value;
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY_MOVIE}&query=${query}`
                : `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY_MOVIE}`;
            
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById("movieResults").innerHTML = data.results.map(m => `
                <div class="movie-item" onclick="playTrailer(${m.id})">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w200'+m.poster_path : 'https://via.placeholder.com/200x300'}" alt="${m.title}">
                    <p>${m.title}</p>
                </div>`).join("");
        }

        async function playTrailer(id) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY_MOVIE}`);
            const data = await res.json();
            const trailer = data.results.find(v => v.type === 'Trailer');
            if(trailer) {
                document.getElementById("videoPlayer").innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                document.getElementById("videoModal").style.display = "flex";
            } else {
                alert("Trailer not found.");
            }
        }

        function closeModal() {
            document.getElementById("videoModal").style.display = "none";
            document.getElementById("videoPlayer").innerHTML = "";
        }

        // 4. MOTIVATION WITH INSIGHT
        async function getQuote() {
            const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://zenquotes.io/api/random"));
            const json = await res.json();
            const quote = JSON.parse(json.contents)[0];
            
            document.getElementById("quoteText").textContent = `"${quote.q}"`;
            document.getElementById("quoteAuthor").textContent = `— ${quote.a}`;
            
            const insights = [
                "This reminds us that growth often happens outside of our comfort zone.",
                "Perspective is everything; how we view the problem is usually the problem.",
                "Small consistent actions lead to massive long-term results.",
                "True wisdom lies in knowing that you still have much to learn."
            ];
            document.getElementById("quoteInsight").textContent = "🤔 Insight: " + insights[Math.floor(Math.random() * insights.length)];
        }

        window.onload = () => {
            initWeather();
            getNews();
            searchMovies();
            getQuote();
        };
    </script>
</body>
</html>
