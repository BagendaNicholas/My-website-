<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Dashboard Pro 🛡️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color:#f8fafc;
            font-family:'Segoe UI',Roboto,Arial,sans-serif;
            min-height:100vh;
            padding:20px;
        }

        .header{
            text-align:center;
            margin-bottom:30px;
        }

        .header h1{
            font-size:2.3rem;
            margin-bottom:10px;
        }

        .dashboard{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:25px;
            max-width:1400px;
            margin:auto;
        }

        .card{
            background:rgba(30,41,59,0.7);
            border-radius:20px;
            padding:20px;
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.1);
        }

        h2{
            margin-bottom:15px;
            display:flex;
            align-items:center;
            gap:10px;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.08);
            color:white;
            margin-bottom:10px;
        }

        button{
            padding:12px;
            border:none;
            border-radius:10px;
            background:#3b82f6;
            color:white;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            background:#2563eb;
            transform:scale(1.02);
        }

        /* NEWS */

        .news-grid{
            max-height:600px;
            overflow-y:auto;
        }

        .news-item{
            background:rgba(255,255,255,0.05);
            border-radius:14px;
            margin-top:15px;
            cursor:pointer;
            transition:0.3s;
            border-left:4px solid #3b82f6;
            overflow:hidden;
            display:flex;
            gap:12px;
        }

        .news-item:hover{
            background:rgba(59,130,246,0.15);
            transform:translateX(8px);
        }

        .news-item-img{
            width:100px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
            flex-shrink:0;
        }

        .news-item-content{
            padding:12px;
            flex:1;
        }

        .news-item h4{
            margin-bottom:5px;
            color:#3b82f6;
            font-size:0.95rem;
        }

        .news-item p{
            font-size:0.8rem;
            opacity:0.8;
            line-height:1.3;
        }

        .source{
            font-size:0.7rem;
            color:#94a3b8;
        }

        /* MOVIES */

        .movie-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
            margin-top:10px;
            max-height:450px;
            overflow-y:auto;
        }

        .movie-item{
            background:rgba(0,0,0,0.2);
            padding:5px;
            border-radius:8px;
            cursor:pointer;
            text-align:center;
            transition:0.3s;
        }

        .movie-item:hover{
            transform:scale(1.05);
            background:rgba(59,130,246,0.2);
        }

        .movie-item img{
            width:100%;
            border-radius:5px;
            margin-bottom:5px;
        }

        /* QUOTES */

        .quote-container{
            background:rgba(59,130,246,0.1);
            border-left:4px solid #3b82f6;
            padding:15px;
            border-radius:10px;
        }

        #quoteText{
            font-size:1.1rem;
            line-height:1.5;
            font-style:italic;
            margin-bottom:10px;
        }

        #quoteAuthor{
            color:#3b82f6;
            margin-bottom:15px;
            font-weight:bold;
        }

        .quote-explanation{
            background:rgba(255,255,255,0.05);
            padding:12px;
            border-radius:8px;
            border-left:3px solid #10b981;
        }

        .quote-explanation-title{
            color:#10b981;
            margin-bottom:6px;
            font-weight:bold;
        }

        .quote-explanation-text{
            font-size:0.85rem;
            line-height:1.5;
            opacity:0.9;
        }

        /* VIDEO MODAL */

        #videoModal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            z-index:1000;
            justify-content:center;
            align-items:center;
        }

        .modal-inner{
            width:90%;
            max-width:800px;
            position:relative;
        }

        .close-btn{
            position:absolute;
            top:-45px;
            right:0;
            background:red;
        }

        /* NEWS MODAL */

        #newsModal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.95);
            z-index:1000;
            justify-content:center;
            align-items:center;
            overflow-y:auto;
        }

        .news-modal-inner{
            width:90%;
            max-width:850px;
            background:rgba(30,41,59,0.98);
            border-radius:20px;
            padding:30px;
            position:relative;
            margin:20px auto;
        }

        .close-news-btn{
            position:absolute;
            top:15px;
            right:20px;
            background:red;
        }

        .news-modal-img{
            width:100%;
            border-radius:12px;
            margin-bottom:20px;
            max-height:400px;
            object-fit:cover;
        }

        a{
            color:white;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🛡️ Guardian Dashboard Pro</h1>
        <p>Your Daily Source of Inspiration & Entertainment</p>
    </div>

    <div class="dashboard">

        <!-- NEWS -->
        <div class="card">
            <h2>📰 Global News</h2>

            <select id="newsCategory" onchange="getNews()">
                <option value="general">General</option>
                <option value="technology">Technology</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
            </select>

            <div id="newsContent" class="news-grid"></div>
        </div>

        <!-- MOVIES -->
        <div class="card">
            <h2>🎬 Movie Finder</h2>

            <input type="text"
                   id="movieSearch"
                   placeholder="Search for a movie..."
                   onkeyup="if(event.key==='Enter') searchMovies()">

            <button onclick="searchMovies()">Search</button>

            <div id="movieResults" class="movie-grid"></div>
        </div>

        <!-- QUOTES -->
        <div class="card">
            <h2>💬 Daily Wisdom</h2>

            <div class="quote-container">
                <p id="quoteText"></p>
                <p id="quoteAuthor"></p>

                <div class="quote-explanation">
                    <div class="quote-explanation-title">
                        💡 What This Means:
                    </div>

                    <p class="quote-explanation-text"
                       id="quoteExplanation"></p>
                </div>
            </div>

            <button onclick="getQuote()" style="margin-top:15px;">
                New Wisdom
            </button>
        </div>

    </div>

    <!-- VIDEO MODAL -->

    <div id="videoModal">
        <div class="modal-inner">

            <button class="close-btn"
                    onclick="closeModal()">
                Close
            </button>

            <div id="videoPlayer"
                 style="aspect-ratio:16/9;">
            </div>

        </div>
    </div>

    <!-- NEWS MODAL -->

    <div id="newsModal">
        <div class="news-modal-inner">

            <button class="close-news-btn"
                    onclick="closeNewsModal()">
                ✕ Close
            </button>

            <img id="newsModalImg"
                 class="news-modal-img"
                 src="">

            <h2 id="newsModalTitle"
                style="margin-bottom:15px;color:#3b82f6;">
            </h2>

            <div id="newsModalContent"
                 style="line-height:1.7;margin-bottom:20px;">
            </div>

            <div style="
                padding:15px;
                background:rgba(255,255,255,0.05);
                border-radius:10px;
            ">

                <p id="newsModalSource"
                   style="font-size:0.85rem;color:#94a3b8;margin-bottom:8px;">
                </p>

                <p id="newsModalDate"
                   style="font-size:0.8rem;color:#64748b;">
                </p>

            </div>

        </div>
    </div>

<script>

const API_KEY_MOVIE = "2a76ab20531de6848483abb62c0f0c50";

let currentNewsData = [];

/* NEWS */

function getNews(){

const cat = document.getElementById("newsCategory").value;

const mockNews = {

general: [

{
t:"SpaceX Shares Major Update",
d:"Latest SpaceX update shared on X platform with new mission details.",
fullContent:"Click below to read the full SpaceX article.",
img:"https://images.unsplash.com/photo-1516849841032-87cbac4d88f?w=800&h=500&fit=crop",
source:"X / SpaceX",
date:"May 2026",
link:"https://x.com/SpaceX/status/2053929135936864393"
},

{
t:"UPDF Passes Out Platoon Commanders",
d:"UPDF successfully passes out platoon commanders at Labwordwong Training School.",
fullContent:"Read the complete UPDF article from the official source.",
img:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&h=500&fit=crop",
source:"UPDF",
date:"May 2026",
link:"https://share.google/VkRN1S0Y5R7yMXsP5"
},

{
t:"Luuka Weather Forecast",
d:"Latest weather forecast for Luuka, Uganda.",
fullContent:"Check live weather updates and forecasts.",
img:"https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800&h=500&fit=crop",
source:"AccuWeather",
date:"Today",
link:"https://share.google/gaoTs0YPZgvsyCX5R"
}

],

technology:[

{
t:"5 Android Phones Better Than Motorola Razr Fold",
d:"Best Android alternatives to the Motorola Razr Fold.",
fullContent:"See the full smartphone comparison.",
img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800&h=500&fit=crop",
source:"Technology News",
date:"May 2026",
link:"https://share.google/DSeIj2HBKMAYxT1ft"
},

{
t:"XDA Android News",
d:"Latest Android and smartphone developments from XDA.",
fullContent:"Read the full XDA article.",
img:"https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800&h=500&fit=crop",
source:"XDA",
date:"May 2026",
link:"https://share.google/Umgz8yJR9b3hEVSuQ"
}

],

business:[

{
t:"Trending Business Update",
d:"Latest online business and market developments.",
fullContent:"Open the source to read the full update.",
img:"https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=800&h=500&fit=crop",
source:"X",
date:"May 2026",
link:"https://share.google/BLFxkfFh3ryjjCgDt"
}

],

entertainment:[

{
t:"Arsenal Latest News",
d:"Latest Arsenal football club updates and transfer news.",
fullContent:"Read the complete Arsenal update online.",
img:"https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800&h=500&fit=crop",
source:"now.arsenal",
date:"May 2026",
link:"https://share.google/gyviwNOjlp5IIVW1K"
},

{
t:"BBC Trending Story",
d:"Latest breaking and trending story from BBC News.",
fullContent:"Open BBC article for full details.",
img:"https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&h=500&fit=crop",
source:"BBC",
date:"May 2026",
link:"https://share.google/HCJrR2jOLqrXuIpvA"
}

]

};

currentNewsData = mockNews[cat];

document.getElementById("newsContent").innerHTML =
currentNewsData.map((n,idx)=>`

<div class="news-item"
     onclick="openNewsModal(${idx})">

<img src="${n.img}"
     class="news-item-img">

<div class="news-item-content">

<h4>📌 ${n.t}</h4>

<p>${n.d}</p>

<span class="source">${n.source}</span>

</div>
</div>

`).join("");

}

/* OPEN NEWS */

function openNewsModal(index){

const news = currentNewsData[index];

document.getElementById("newsModalImg").src = news.img;

document.getElementById("newsModalTitle").textContent = news.t;

document.getElementById("newsModalContent").innerHTML = `

<p style="margin-bottom:20px;">
${news.fullContent}
</p>

<a href="${news.link}"
   target="_blank"
   style="
   display:inline-block;
   padding:12px 20px;
   background:#3b82f6;
   border-radius:10px;
   text-decoration:none;
   font-weight:bold;
   ">

🔗 Read Full Article

</a>

`;

document.getElementById("newsModalSource").textContent =
`📰 Source: ${news.source}`;

document.getElementById("newsModalDate").textContent =
`📅 ${news.date}`;

document.getElementById("newsModal").style.display = "flex";

}

function closeNewsModal(){
document.getElementById("newsModal").style.display = "none";
}

/* MOVIES */

async function searchMovies(){

const query = document.getElementById("movieSearch").value;

const url = query
? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY_MOVIE}&query=${query}`
: `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY_MOVIE}`;

try{

const res = await fetch(url);

const data = await res.json();

document.getElementById("movieResults").innerHTML =
data.results.map(m=>`

<div class="movie-item"
     onclick="playTrailer(${m.id})">

<img src="${
m.poster_path
? 'https://image.tmdb.org/t/p/w200'+m.poster_path
: 'https://via.placeholder.com/200x300'
}">

<p>${m.title}</p>

</div>

`).join("");

}catch(err){

console.log(err);

}

}

async function playTrailer(id){

try{

const res = await fetch(
`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY_MOVIE}`
);

const data = await res.json();

const trailer = data.results.find(v=>v.type==="Trailer");

if(trailer){

document.getElementById("videoPlayer").innerHTML = `
<iframe width="100%"
height="100%"
src="https://www.youtube.com/embed/${trailer.key}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>`;

document.getElementById("videoModal").style.display="flex";

}else{

alert("No trailer available.");

}

}catch(err){

console.log(err);

}

}

function closeModal(){

document.getElementById("videoModal").style.display="none";

document.getElementById("videoPlayer").innerHTML="";

}

/* QUOTES */

async function getQuote(){

const quotes = [

{
q:"Success is the sum of small efforts repeated daily.",
a:"Robert Collier",
e:"Great achievements come from consistency and discipline."
},

{
q:"Your future is created by what you do today.",
a:"Unknown",
e:"Every small decision shapes tomorrow."
},

{
q:"Do not fear failure. Fear not trying.",
a:"Roy T. Bennett",
e:"Growth begins when you dare to take action."
},

{
q:"Dream big and dare to fail.",
a:"Norman Vaughan",
e:"Big dreams require bold steps."
}

];

const random = quotes[Math.floor(Math.random()*quotes.length)];

document.getElementById("quoteText").textContent =
`"${random.q}"`;

document.getElementById("quoteAuthor").textContent =
`— ${random.a}`;

document.getElementById("quoteExplanation").textContent =
random.e;

}

/* START */

window.onload = ()=>{

getNews();

searchMovies();

getQuote();

};

</script>

</body>
</html>
