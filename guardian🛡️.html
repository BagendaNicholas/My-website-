<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guardian Dashboard Pro 🛡️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:#f8fafc;
    font-family:'Segoe UI',Roboto,sans-serif;
    min-height:100vh;
    padding:20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2.5rem;
    margin-bottom:8px;
}

.weather-box{
    margin-top:20px;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:15px;
    display:inline-block;
    min-width:260px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
}

/* DASHBOARD */

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    max-width:1400px;
    margin:auto;
}

.card{
    background:rgba(30,41,59,0.7);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
}

h2{
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* INPUTS */

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    margin-bottom:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#2563eb;
    transform:scale(1.02);
}

/* NEWS */

.news-grid{
    max-height:600px;
    overflow-y:auto;
}

.news-item{
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
    border-left:4px solid #3b82f6;
    overflow:hidden;
    display:flex;
    gap:12px;
}

.news-item:hover{
    background:rgba(59,130,246,0.15);
    transform:translateX(8px);
}

.news-item-img{
    width:110px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    flex-shrink:0;
}

.news-item-content{
    padding:12px;
    flex:1;
}

.news-item h4{
    margin-bottom:6px;
    color:#3b82f6;
    font-size:0.95rem;
}

.news-item p{
    font-size:0.82rem;
    opacity:0.85;
    line-height:1.4;
}

.source{
    font-size:0.75rem;
    color:#94a3b8;
}

/* MOVIES */

.movie-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:10px;
    max-height:450px;
    overflow-y:auto;
}

.movie-item{
    background:rgba(0,0,0,0.2);
    padding:6px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
}

.movie-item:hover{
    transform:scale(1.05);
    background:rgba(59,130,246,0.2);
}

.movie-item img{
    width:100%;
    border-radius:8px;
    margin-bottom:5px;
}

.movie-item p{
    font-size:0.85rem;
}

/* QUOTES */

.quote-container{
    background:rgba(59,130,246,0.1);
    border-left:4px solid #3b82f6;
    padding:15px;
    border-radius:10px;
}

#quoteText{
    font-size:1.1rem;
    line-height:1.5;
    font-style:italic;
    margin-bottom:10px;
}

#quoteAuthor{
    color:#3b82f6;
    margin-bottom:15px;
    font-weight:bold;
}

.quote-explanation{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:8px;
    border-left:3px solid #10b981;
}

.quote-explanation-title{
    color:#10b981;
    margin-bottom:6px;
    font-weight:bold;
}

.quote-explanation-text{
    font-size:0.85rem;
    line-height:1.5;
}

/* MODALS */

#videoModal,
#newsModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    z-index:1000;
    justify-content:center;
    align-items:center;
}

.modal-inner,
.news-modal-inner{
    width:90%;
    max-width:850px;
    position:relative;
}

.news-modal-inner{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    overflow-y:auto;
    max-height:90vh;
}

.close-btn,
.close-news-btn{
    position:absolute;
    top:-45px;
    right:0;
    background:red;
}

.news-modal-img{
    width:100%;
    border-radius:12px;
    margin-bottom:20px;
    max-height:400px;
    object-fit:cover;
}

a{
    color:white;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="header">

    <h1>🛡️ Guardian Dashboard Pro</h1>

    <p>Your Daily Source of Inspiration & Entertainment</p>

    <div id="weatherBox" class="weather-box">

        🌍 Detecting your weather...

    </div>

</div>

<div class="dashboard">

    <!-- NEWS -->

    <div class="card">

        <h2>📰 Global News</h2>

        <select id="newsCategory" onchange="getNews()">

            <option value="general">General</option>

            <option value="technology">Technology</option>

            <option value="business">Business</option>

            <option value="entertainment">Entertainment</option>

        </select>

        <div id="newsContent" class="news-grid"></div>

    </div>

    <!-- MOVIES -->

    <div class="card">

        <h2>🎬 Movie Finder</h2>

        <input type="text"
               id="movieSearch"
               placeholder="Search for a movie..."
               onkeyup="if(event.key==='Enter') searchMovies()">

        <button onclick="searchMovies()">
            Search
        </button>

        <div id="movieResults" class="movie-grid"></div>

    </div>

    <!-- QUOTES -->

    <div class="card">

        <h2>💬 Daily Wisdom</h2>

        <div class="quote-container">

            <p id="quoteText"></p>

            <p id="quoteAuthor"></p>

            <div class="quote-explanation">

                <div class="quote-explanation-title">
                    💡 What This Means:
                </div>

                <p id="quoteExplanation"
                   class="quote-explanation-text"></p>

            </div>

        </div>

        <button onclick="getQuote()"
                style="margin-top:15px;">

            New Wisdom

        </button>

    </div>

</div>

<!-- VIDEO MODAL -->

<div id="videoModal">

    <div class="modal-inner">

        <button class="close-btn"
                onclick="closeModal()">

            Close

        </button>

        <div id="videoPlayer"
             style="aspect-ratio:16/9;">
        </div>

    </div>

</div>

<!-- NEWS MODAL -->

<div id="newsModal">

    <div class="news-modal-inner">

        <button class="close-news-btn"
                onclick="closeNewsModal()">

            ✕ Close

        </button>

        <img id="newsModalImg"
             class="news-modal-img">

        <h2 id="newsModalTitle"
            style="margin-bottom:15px;color:#3b82f6;">
        </h2>

        <div id="newsModalContent"
             style="line-height:1.7;margin-bottom:20px;">
        </div>

        <div style="
            padding:15px;
            background:rgba(255,255,255,0.05);
            border-radius:10px;
        ">

            <p id="newsModalSource"
               style="font-size:0.85rem;color:#94a3b8;margin-bottom:8px;">
            </p>

            <p id="newsModalDate"
               style="font-size:0.8rem;color:#64748b;">
            </p>

        </div>

    </div>

</div>

<script>

/* =========================
   MOVIE API
========================= */

const API_KEY_MOVIE =
"2a76ab20531de6848483abb62c0f0c50";

let currentNewsData = [];

/* =========================
   LIVE NEWS
========================= */

async function getNews(){

const cat =
document.getElementById("newsCategory").value;

const feeds = {

general:
"https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/rss.xml",

technology:
"https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/technology/rss.xml",

business:
"https://api.rss2json.com/v1/api.json?rss_url=http://feeds.reuters.com/reuters/businessNews",

entertainment:
"https://api.rss2json.com/v1/api.json?rss_url=https://feeds.skynews.com/feeds/rss/entertainment.xml"

};

try{

const res = await fetch(feeds[cat]);

const data = await res.json();

currentNewsData = data.items;

document.getElementById("newsContent").innerHTML =

currentNewsData.map((n,idx)=>`

<div class="news-item"
     onclick="openNewsModal(${idx})">

<img src="${
n.thumbnail ||
'https://via.placeholder.com/300'
}"
class="news-item-img">

<div class="news-item-content">

<h4>📌 ${n.title}</h4>

<p>
${
n.description
.replace(/<[^>]*>?/gm,'')
.substring(0,120)
}...
</p>

<span class="source">
${n.author || 'Live News'}
</span>

</div>

</div>

`).join("");

}catch(err){

console.log(err);

document.getElementById("newsContent").innerHTML =
"<p>⚠️ Failed to load live news.</p>";

}

}

/* =========================
   OPEN NEWS
========================= */

function openNewsModal(index){

const news = currentNewsData[index];

document.getElementById("newsModalImg").src =
news.thumbnail ||
"https://via.placeholder.com/800x400";

document.getElementById("newsModalTitle").textContent =
news.title;

document.getElementById("newsModalContent").innerHTML = `

<p style="margin-bottom:20px;">
${news.description}
</p>

<a href="${news.link}"
   target="_blank"
   style="
   display:inline-block;
   padding:12px 20px;
   background:#3b82f6;
   border-radius:10px;
   font-weight:bold;
   ">

🔗 Read Full Article

</a>

`;

document.getElementById("newsModalSource").textContent =
`📰 Source: ${news.author || 'Live News'}`;

document.getElementById("newsModalDate").textContent =
`📅 ${news.pubDate}`;

document.getElementById("newsModal").style.display =
"flex";

}

function closeNewsModal(){

document.getElementById("newsModal").style.display =
"none";

}

/* =========================
   MOVIES
========================= */

async function searchMovies(){

const query =
document.getElementById("movieSearch").value;

const url = query

? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY_MOVIE}&query=${query}`

: `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY_MOVIE}`;

try{

const res = await fetch(url);

const data = await res.json();

document.getElementById("movieResults").innerHTML =

data.results.map(m=>`

<div class="movie-item"
     onclick="playTrailer(${m.id})">

<img src="${
m.poster_path
? 'https://image.tmdb.org/t/p/w200'+m.poster_path
: 'https://via.placeholder.com/200x300'
}">

<p>${m.title}</p>

</div>

`).join("");

}catch(err){

console.log(err);

}

}

async function playTrailer(id){

try{

const res = await fetch(

`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY_MOVIE}`

);

const data = await res.json();

const trailer =
data.results.find(v=>v.type==="Trailer");

if(trailer){

document.getElementById("videoPlayer").innerHTML = `

<iframe width="100%"
height="100%"
src="https://www.youtube.com/embed/${trailer.key}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>

`;

document.getElementById("videoModal").style.display =
"flex";

}else{

alert("No trailer available.");

}

}catch(err){

console.log(err);

}

}

function closeModal(){

document.getElementById("videoModal").style.display =
"none";

document.getElementById("videoPlayer").innerHTML =
"";

}

/* =========================
   LIVE WEATHER
========================= */

async function getWeather(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

async position=>{

const lat = position.coords.latitude;

const lon = position.coords.longitude;

try{

const res = await fetch(

`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`

);

const data = await res.json();

document.getElementById("weatherBox").innerHTML = `

<h3>🌤️ Your Weather</h3>

<p style="margin-top:10px;">
🌡️ Temperature:
${data.current_weather.temperature}°C
</p>

<p>
💨 Wind Speed:
${data.current_weather.windspeed} km/h
</p>

<p>
📍 Based on your location
</p>

`;

}catch(err){

console.log(err);

document.getElementById("weatherBox").innerHTML =
"⚠️ Weather unavailable.";

}

},

()=>{

document.getElementById("weatherBox").innerHTML =
"📍 Please allow location access.";

}

);

}

}

/* =========================
   LIVE QUOTES
========================= */

async function getQuote(){

try{

const res = await fetch(
"https://api.allorigins.win/raw?url=https://zenquotes.io/api/random"
);

const data = await res.json();

const quote = data[0];

document.getElementById("quoteText").textContent =
`"${quote.q}"`;

document.getElementById("quoteAuthor").textContent =
`— ${quote.a}`;

const text = quote.q.toLowerCase();

let explanation =
"This wisdom encourages reflection, growth, and positive action in life.";

if(text.includes("success")){

explanation =
"Success comes through persistence, patience, and effort.";

}else if(text.includes("fear")){

explanation =
"Courage means moving forward despite fear.";

}else if(text.includes("dream")){

explanation =
"Dreams become reality through action and belief.";

}else if(text.includes("love")){

explanation =
"Love creates connection and meaning in life.";

}else if(text.includes("time")){

explanation =
"Time is precious because it never returns.";

}else if(text.includes("life")){

explanation =
"Life teaches growth through experiences.";

}else if(text.includes("change")){

explanation =
"Positive change begins with small actions.";

}else if(text.includes("hope")){

explanation =
"Hope gives strength during difficult moments.";

}

document.getElementById("quoteExplanation").textContent =
explanation;

}catch(err){

console.log(err);

document.getElementById("quoteText").textContent =
"⚠️ Failed to load quote.";

document.getElementById("quoteAuthor").textContent =
"";

document.getElementById("quoteExplanation").textContent =
"Please check your internet connection.";

}

}

/* =========================
   START APP
========================= */

window.onload = ()=>{

getNews();

searchMovies();

getQuote();

getWeather();

};

</script>

</body>
</html>
