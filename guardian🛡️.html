<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Dashboard 🛡️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        h2 { margin-bottom: 15px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        /* UI ELEMENTS */
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 10px;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }

        /* MOVIE GRID */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-height: 450px;
            overflow-y: auto;
        }
        .movie-item {
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
        }
        .movie-item img { width: 100%; border-radius: 5px; margin-bottom: 5px; }

        /* MODAL */
        #videoModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-inner { width: 90%; max-width: 800px; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; background: red; }

        /* NEWS MODAL */
        #newsModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .news-modal-inner {
            width: 90%; max-width: 700px; background: rgba(30, 41, 59, 0.95);
            border-radius: 20px; padding: 30px; position: relative;
            max-height: 80vh; overflow-y: auto;
        }
        .close-news-btn { position: absolute; top: 15px; right: 20px; background: red; padding: 8px 15px; }

        /* NEWS ITEMS */
        .news-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid #3b82f6;
        }
        .news-item:hover {
            background: rgba(59, 130, 246, 0.15);
            transform: translateX(5px);
        }
        .news-item h4 { margin-bottom: 5px; color: #3b82f6; }
        .news-item p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 5px; }
        .news-item .source { font-size: 0.75rem; color: #94a3b8; }

        /* QUOTE INSIGHT */
        .insight-line {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ Guardian Dashboard</h1>
        <p id="locationDisplay">Detecting your location...</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>🌦️ Local Weather</h2>
            <div id="weatherContent">Loading local weather...</div>
        </div>

        <div class="card">
            <h2>📰 Global News</h2>
            <select id="newsCategory" onchange="getNews()">
                <option value="general">General</option>
                <option value="technology">Technology</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
            </select>
            <div id="newsContent"></div>
        </div>

        <div class="card">
            <h2>🎬 Movie Finder</h2>
            <input type="text" id="movieSearch" placeholder="Search for a movie..." onkeyup="if(event.key === 'Enter') searchMovies()">
            <button onclick="searchMovies()">Search</button>
            <div id="movieResults" class="movie-grid"></div>
        </div>

        <div class="card">
            <h2>💬 Daily Motivation</h2>
            <div id="quoteArea">
                <p id="quoteText" style="font-size: 1.1rem; line-height: 1.4;"></p>
                <p id="quoteAuthor" style="color: #3b82f6; margin-top: 5px;"></p>
                <div id="quoteInsight" class="insight-line"></div>
            </div>
            <button onclick="getQuote()" style="margin-top: 15px;">New Wisdom</button>
        </div>
    </div>

    <div id="videoModal">
        <div class="modal-inner">
            <button class="close-btn" onclick="closeModal()">Close</button>
            <div id="videoPlayer" style="aspect-ratio: 16/9;"></div>
        </div>
    </div>

    <!-- NEWS DETAIL MODAL -->
    <div id="newsModal">
        <div class="news-modal-inner">
            <button class="close-news-btn" onclick="closeNewsModal()">Close</button>
            <h2 id="newsModalTitle" style="margin-bottom: 15px;"></h2>
            <p id="newsModalContent"></p>
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                <p id="newsModalSource" style="font-size: 0.85rem; color: #94a3b8;"></p>
                <a id="newsModalLink" href="#" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Read Full Article →</a>
            </div>
        </div>
    </div>

    <script>
        const API_KEY_MOVIE = "2a76ab20531de6848483abb62c0f0c50";
        const API_KEY_WEATHER = "f00c597effd4755170baf386159832f8";

        // Store news data for modal
        let currentNewsData = [];

        // 1. AUTO WEATHER - FIXED
        function initWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY_WEATHER}&units=metric`);
                        const data = await res.json();
                        
                        if (data.cod === 200) {
                            document.getElementById("locationDisplay").textContent = `Currently in ${data.name}`;
                            document.getElementById("weatherContent").innerHTML = `
                                <div style="text-align:center;">
                                    <h3 style="font-size:2.5rem; color: #fbbf24;">${Math.round(data.main.temp)}°C</h3>
                                    <p style="font-size:1.1rem; margin: 10px 0;">${data.weather[0].description.toUpperCase()}</p>
                                    <p style="opacity: 0.8;">💧 Humidity: ${data.main.humidity}%</p>
                                    <p style="opacity: 0.8;">💨 Wind: ${data.wind.speed} m/s</p>
                                    <p style="opacity: 0.8; margin-top: 8px;">🌡️ Feels like: ${Math.round(data.main.feels_like)}°C</p>
                                </div>`;
                        } else {
                            throw new Error("Weather API error");
                        }
                    } catch (err) {
                        document.getElementById("weatherContent").innerHTML = `
                            <div style="text-align:center; padding: 20px;">
                                <p>⚠️ Unable to fetch weather</p>
                                <p style="font-size:0.85rem; opacity:0.7; margin-top: 10px;">Please allow location access</p>
                            </div>`;
                    }
                }, () => {
                    document.getElementById("weatherContent").innerHTML = `
                        <div style="text-align:center; padding: 20px;">
                            <p>📍 Location access denied</p>
                            <p style="font-size:0.85rem; opacity:0.7; margin-top: 10px;">Enable location permissions to see weather</p>
                        </div>`;
                });
            } else {
                document.getElementById("weatherContent").textContent = "Geolocation not supported.";
            }
        }

        // 2. NEWS BY CATEGORY WITH CLICKABLE POSTS
        function getNews() {
            const cat = document.getElementById("newsCategory").value;
            const mockNews = {
                general: [
                    {t: "Global Markets Steady", d: "Stocks hold firm as 2026 begins with positive investor sentiment.", url: "#", source: "Global Finance News"},
                    {t: "Climate Summit Progress", d: "World leaders reach agreement on carbon emission targets.", url: "#", source: "Environmental Weekly"}
                ],
                technology: [
                    {t: "AI Code Partners Evolve", d: "New models show 90% accuracy in coding tasks and debugging. Major breakthrough in automated development.", url: "#", source: "Tech Daily"},
                    {t: "Quantum Computing Milestone", d: "Researchers achieve new quantum computing breakthrough with 1000+ qubits.", url: "#", source: "Science & Tech"}
                ],
                business: [
                    {t: "Startup Boom", d: "Clean energy startups see record funding in 2026. Billions invested in renewable innovations.", url: "#", source: "Business Insider"},
                    {t: "E-commerce Growth", d: "Online retail sectors report 45% growth year-over-year.", url: "#", source: "Commerce Weekly"}
                ],
                entertainment: [
                    {t: "Box Office Record", d: "Latest sci-fi epic breaks records with $500M opening weekend globally.", url: "#", source: "Entertainment Weekly"},
                    {t: "Music Festival Announcements", d: "Major festivals announced for summer 2026 with star-studded lineups.", url: "#", source: "Entertainment News"}
                ]
            };
            
            currentNewsData = mockNews[cat] || mockNews.general;
            document.getElementById("newsContent").innerHTML = currentNewsData.map((n, idx) => `
                <div class="news-item" onclick="openNewsModal(${idx})">
                    <h4>📌 ${n.t}</h4>
                    <p>${n.d}</p>
                    <span class="source">${n.source}</span>
                </div>`).join("");
        }

        // Open news detail modal
        function openNewsModal(index) {
            const news = currentNewsData[index];
            document.getElementById("newsModalTitle").textContent = news.t;
            document.getElementById("newsModalContent").textContent = news.d;
            document.getElementById("newsModalSource").textContent = `Source: ${news.source}`;
            document.getElementById("newsModalLink").href = news.url;
            document.getElementById("newsModal").style.display = "flex";
        }

        function closeNewsModal() {
            document.getElementById("newsModal").style.display = "none";
        }

        // 3. MOVIE SEARCH
        async function searchMovies() {
            const query = document.getElementById("movieSearch").value;
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY_MOVIE}&query=${query}`
                : `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY_MOVIE}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById("movieResults").innerHTML = data.results.map(m => `
                    <div class="movie-item" onclick="playTrailer(${m.id})">
                        <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w200'+m.poster_path : 'https://via.placeholder.com/200x300'}" alt="${m.title}">
                        <p>${m.title}</p>
                    </div>`).join("");
            } catch (err) {
                console.error("Movie search error:", err);
            }
        }

        async function playTrailer(id) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY_MOVIE}`);
                const data = await res.json();
                const trailer = data.results.find(v => v.type === 'Trailer');
                if(trailer) {
                    document.getElementById("videoPlayer").innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                    document.getElementById("videoModal").style.display = "flex";
                } else {
                    alert("No trailer available for this movie.");
                }
            } catch (err) {
                console.error("Trailer fetch error:", err);
            }
        }

        function closeModal() {
            document.getElementById("videoModal").style.display = "none";
            document.getElementById("videoPlayer").innerHTML = "";
        }

        // 4. MOTIVATION WITH INSIGHT
        async function getQuote() {
            try {
                const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://zenquotes.io/api/random"));
                const json = await res.json();
                const quote = JSON.parse(json.contents)[0];
                
                document.getElementById("quoteText").textContent = `"${quote.q}"`;
                document.getElementById("quoteAuthor").textContent = `— ${quote.a}`;
                
                const insights = [
                    "This reminds us that growth often happens outside of our comfort zone.",
                    "Perspective is everything; how we view the problem is usually the problem.",
                    "Small consistent actions lead to massive long-term results.",
                    "True wisdom lies in knowing that you still have much to learn."
                ];
                document.getElementById("quoteInsight").textContent = "🤔 Insight: " + insights[Math.floor(Math.random() * insights.length)];
            } catch (err) {
                console.error("Quote fetch error:", err);
                document.getElementById("quoteText").textContent = "\"The only way to do great work is to love what you do.\"";
                document.getElementById("quoteAuthor").textContent = "— Steve Jobs";
            }
        }

        window.onload = () => {
            initWeather();
            getNews();
            searchMovies();
            getQuote();
        };
    </script>
</body>
</html>
