<head>
    <meta charset="UTF-8">

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            min-height: 500px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 { 
            margin-bottom: 15px; 
            font-size: 1.4rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* UI ELEMENTS */
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 10px;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        button:hover { 
            background: #2563eb;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled { 
            background: #64748b; 
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* REGION SELECTOR */
        .region-selector {
            display: flex; 
            gap: 8px; 
            margin-bottom: 10px; 
            flex-wrap: wrap;
        }

        .region-btn {
            padding: 8px 12px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
            min-width: 80px;
        }

        .region-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .region-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        /* MOVIE GRID */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-height: 450px;
            overflow-y: auto;
            flex: 1;
        }

        .movie-item {
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
            transition: 0.2s;
        }

        .movie-item:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }

        .movie-item img { 
            width: 100%; 
            border-radius: 5px; 
            margin-bottom: 5px;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .loading { 
            text-align: center; 
            padding: 20px; 
            opacity: 0.7;
            font-size: 0.95rem;
        }

        /* MODAL */
        #videoModal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-inner { 
            width: 90%; 
            max-width: 800px; 
            position: relative; 
        }

        .close-btn { 
            position: absolute; 
            top: -40px; 
            right: 0; 
            background: #ef4444;
            padding: 8px 15px;
        }

        .close-btn:hover {
            background: #dc2626;
        }

        /* NEWS MODAL */
        #newsModal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .news-modal-inner {
            width: 90%; 
            max-width: 800px; 
            background: rgba(30, 41, 59, 0.98);
            border-radius: 20px; 
            padding: 30px; 
            position: relative;
            margin: 20px auto;
        }

        .close-news-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            background: #ef4444; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer;
        }

        .close-news-btn:hover {
            background: #dc2626;
        }

        .news-modal-img { 
            width: 100%; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            max-height: 400px; 
            object-fit: cover; 
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* NEWS ITEMS */
        .news-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid #3b82f6;
            overflow: hidden;
            display: flex;
            gap: 12px;
        }

        .news-item:hover {
            background: rgba(59, 130, 246, 0.15);
            transform: translateX(8px);
        }

        .news-item-img {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .news-item-content {
            padding: 12px;
            flex: 1;
        }

        .news-item h4 { 
            margin-bottom: 5px; 
            color: #3b82f6; 
            font-size: 0.95rem; 
        }

        .news-item p { 
            font-size: 0.8rem; 
            opacity: 0.8; 
            margin-bottom: 5px; 
            line-height: 1.3; 
        }

        .news-item .source { 
            font-size: 0.7rem; 
            color: #94a3b8; 
        }

        .news-item .region { 
            font-size: 0.7rem; 
            color: #10b981; 
            font-weight: 600; 
            display: block;
            margin-top: 4px;
        }

        /* QUOTE SECTION */
        .quote-container {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        #quoteText {
            font-size: 1.15rem;
            line-height: 1.5;
            font-style: italic;
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        #quoteAuthor {
            color: #3b82f6;
            margin-bottom: 15px;
            font-weight: 600;
        }

            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border-left: 3px solid #10b981;
        }

        .quote-explanation-title {
            font-size: 0.85rem;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .quote-explanation-text {
            font-size: 0.8rem;
            line-height: 1.4;
            opacity: 0.85;
        }

        /* NEWS GRID */
        .news-grid {
            max-height: 600px;
            overflow-y: auto;
            flex: 1;
        }

        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .movie-grid {
                grid-template-columns: 1fr;
            }

            .region-btn {
                flex: 0 1 auto;
                min-width: auto;
            }
        }
    </style>
</head>

    <div class="header">

    </div>

    <div class="dashboard">

        <div class="card">
            <h2>📰 Global News</h2>
            <select id="newsCategory" onchange="getNews()">
                <option value="general">General News</option>
                <option value="technology">Technology</option>
                <option value="business">Business</option>
                <option value="entertainment">Entertainment</option>
                <option value="africa">Africa & Uganda</option>
            </select>
            <div class="region-selector">
                <button class="region-btn active" onclick="setRegion('global', event)">🌍 Global</button>
                <button class="region-btn" onclick="setRegion('uganda', event)">🇺🇬 Uganda</button>
                <button class="region-btn" onclick="setRegion('africa', event)">🌍 Africa</button>
                <button class="region-btn" onclick="setRegion('asia', event)">🌏 Asia</button>
            </div>
            <div id="newsContent" class="news-grid"></div>
        </div>

        <!-- MOVIE CARD -->
        <div class="card">
            <h2>🎬 Movie Finder</h2>
            <input type="text" id="movieSearch" placeholder="Search for a movie..." onkeyup="if(event.key === 'Enter') searchMovies()">
            <button onclick="searchMovies()">🔍 Search</button>
            <button onclick="refreshMovies()" style="background: #10b981; margin-top: 5px;">🔄 Refresh Trending</button>
            <div id="movieResults" class="movie-grid"></div>
        </div>

        <!-- QUOTE CARD -->
        <div class="card">
            <h2>💬 Daily Wisdom</h2>
            <div id="quoteArea">
                <div class="quote-container">
                    <p id="quoteText"></p>
                    <p id="quoteAuthor"></p>
                    <div class="quote-explanation">
                        <div class="quote-explanation-title">💡 What This Means:</div>
                        <p class="quote-explanation-text" id="quoteExplanation"></p>
                    </div>
                </div>
            </div>
            <button onclick="getQuote()" style="margin-top: 15px;">✨ New Wisdom</button>
        </div>
    </div>

    <!-- VIDEO MODAL -->
    <div id="videoModal">
        <div class="modal-inner">
            <button class="close-btn" onclick="closeModal()">✕ Close</button>
            <div id="videoPlayer" style="aspect-ratio: 16/9;"></div>
        </div>
    </div>

    <!-- NEWS DETAIL MODAL -->
    <div id="newsModal">
        <div class="news-modal-inner">
            <button class="close-news-btn" onclick="closeNewsModal()">✕ Close</button>
            <img id="newsModalImg" class="news-modal-img" src="" alt="Article">
            <h2 id="newsModalTitle" style="margin-bottom: 15px; color: #3b82f6;"></h2>
            <p id="newsModalContent" style="line-height: 1.6; margin-bottom: 20px;"></p>
            <div style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                <p id="newsModalSource" style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px;"></p>
                <p id="newsModalDate" style="font-size: 0.8rem; color: #64748b; margin-bottom: 8px;"></p>
                <p id="newsModalRegion" style="font-size: 0.8rem; color: #10b981;"></p>
            </div>
        </div>
    </div>

        /* ====================================
           REGION SELECTION
           ==================================== */
        function setRegion(region, event) {
            currentRegion = region;
            document.querySelectorAll('.region-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            getNews();
        }

        /* ====================================
           NEWS FUNCTIONS
           ==================================== */
        function getNews() {
            const cat = document.getElementById("newsCategory").value;
            const newsData = internationalNews[cat] || internationalNews.general;
            const regionData = newsData[currentRegion] || newsData.global || [];
            
            currentNewsData = regionData;
            
            if (currentNewsData.length === 0) {
                document.getElementById("newsContent").innerHTML = '<div class="loading">No news available for this region and category.</div>';
                return;
            }

            document.getElementById("newsContent").innerHTML = currentNewsData.map((n, idx) => `
                <div class="news-item" onclick="openNewsModal(${idx})">
                    <img src="${n.img}" alt="${n.t}" class="news-item-img" onerror="this.src='https://via.placeholder.com/100x80'">
                    <div class="news-item-content">
                        <h4>📌 ${n.t}</h4>
                        <p>${n.d}</p>
                        <span class="region">${n.region}</span>
                        <span class="source">${n.source}</span>
                    </div>
                </div>`).join("");
        }

        function openNewsModal(index) {
            const news = currentNewsData[index];
            document.getElementById("newsModalImg").src = news.img;
            document.getElementById("newsModalImg").onerror = function() { this.src = 'https://via.placeholder.com/800x400'; };
            document.getElementById("newsModalTitle").textContent = news.t;
            document.getElementById("newsModalContent").textContent = news.fullContent;
            document.getElementById("newsModalSource").textContent = `📰 Source: ${news.source}`;
            document.getElementById("newsModalDate").textContent = `📅 Date: ${news.date}`;
            document.getElementById("newsModalRegion").textContent = `${news.region}`;
            document.getElementById("newsModal").style.display = "flex";
        }

        function closeNewsModal() {
            document.getElementById("newsModal").style.display = "none";
        }

        /* ====================================
           MOVIE FUNCTIONS
           ==================================== */
        async function searchMovies() {
            const query = document.getElementById("movieSearch").value;
            const url = query 
                ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY_MOVIE}&query=${query}&_t=${Date.now()}`
                : `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY_MOVIE}&_t=${Date.now()}`;
            
            try {
                document.getElementById("movieResults").innerHTML = '<div class="loading">🎬 Loading movies...</div>';
                const res = await fetch(url);
                const data = await res.json();
                
                if (!data.results || data.results.length === 0) {
                    document.getElementById("movieResults").innerHTML = '<div class="loading">No movies found. Try a different search.</div>';
                    return;
                }

                document.getElementById("movieResults").innerHTML = data.results.map(m => `
                    <div class="movie-item" onclick="playTrailer(${m.id})">
                        <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w200'+m.poster_path : 'https://via.placeholder.com/200x300'}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/200x300'">
                        <p>${m.title}</p>
                    </div>`).join("");
            } catch (err) {
                console.error("Movie search error:", err);
                document.getElementById("movieResults").innerHTML = '<div class="loading">❌ Error loading movies. Check your connection.</div>';
            }
        }

        async function refreshMovies() {
            document.getElementById("movieSearch").value = '';
            await searchMovies();
        }

        async function playTrailer(id) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY_MOVIE}`);
                const data = await res.json();
                const trailer = data.results.find(v => v.type === 'Trailer');
                if(trailer) {
                    document.getElementById("videoPlayer").innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                    document.getElementById("videoModal").style.display = "flex";
                } else {
                    alert("No trailer available for this movie. Please try another.");
                }
            } catch (err) {
                console.error("Trailer fetch error:", err);
                alert("Error loading trailer. Please try again.");
            }
        }

        function closeModal() {
            document.getElementById("videoModal").style.display = "none";
            document.getElementById("videoPlayer").innerHTML = "";
        }

        /* ====================================
           QUOTE FUNCTIONS
           ==================================== */
        function getQuote() {
            try {
                // Rotate through local database for consistent fresh quotes
                const quote = quoteDatabase[quoteIndex % quoteDatabase.length];
                quoteIndex++;
                
                document.getElementById("quoteText").textContent = `"${quote.q}"`;
                document.getElementById("quoteAuthor").textContent = `— ${quote.a}`;
                
                const explanation = quoteExplanations[quote.keyword] || "This wisdom invites us to reflect deeply and take meaningful action in our lives.";
                document.getElementById("quoteExplanation").textContent = explanation;
            } catch (err) {
                console.error("Quote fetch error:", err);
                const defaultQuote = quoteDatabase[0];
                document.getElementById("quoteText").textContent = `"${defaultQuote.q}"`;
                document.getElementById("quoteAuthor").textContent = `— ${defaultQuote.a}`;
                document.getElementById("quoteExplanation").textContent = quoteExplanations[defaultQuote.keyword];
            }
        }

        /* ====================================
           CLOSE MODALS ON BACKGROUND CLICK
           ==================================== */
        document.addEventListener('click', function(event) {
            const newsModal = document.getElementById("newsModal");
            const videoModal = document.getElementById("videoModal");
            
            if (event.target === newsModal) {
                closeNewsModal();
            }
            if (event.target === videoModal) {
                closeModal();
            }
        });

        /* ====================================
           INITIALIZATION
           ==================================== */
        window.addEventListener('load', () => {
            getNews();
            searchMovies();
            getQuote();
        });
