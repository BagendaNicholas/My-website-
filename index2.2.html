<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📔 Advanced Secure Notebook</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #2c3e50;
    color: #ecf0f1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }
  .notebook-container {
    background: rgba(44, 62, 80, 0.9);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(236, 240, 241, 0.1);
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #3498db;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }
  label {
    font-size: 15px;
    margin-bottom: 3px;
    color: #8fc5f9;
    display: block;
  }
  select, input[type="text"], input[type="password"], textarea, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #34495e;
    border-radius: 8px;
    box-sizing: border-box;
    background: #34495e;
    color: #ecf0f1;
    font-size: 16px;
  }
  textarea {
    min-height: 150px;
    resize: vertical;
  }
  button {
    background: #3498db;
    cursor: pointer;
    transition: background 0.3s ease;
    font-weight: bold;
  }
  button:hover {
    background: #2980b9;
  }
  .delete-btn {
    background: #e74c3c;
  }
  .delete-btn:hover {
    background: #c0392b;
  }
  .flex-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .flex-row input, .flex-row select {
    flex-grow: 1;
    margin: 0;
  }
  .flex-row button {
    width: auto;
    padding: 12px 18px;
    margin: 0;
  }
  #notesList, #recycleBinList {
    list-style: none;
    padding: 0;
    margin-top: 20px;
    max-height: 300px;
    overflow-y: auto;
  }
  #notesList li, #recycleBinList li {
    background: #34495e;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.3s ease;
  }
  #notesList li:hover, #recycleBinList li:hover {
    background: #465d75;
  }
  #notesList li span, #recycleBinList li span {
    flex-grow: 1;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .action-buttons button {
    flex-grow: 1;
  }
  .status-message {
    text-align: center;
    margin-top: 10px;
    font-style: italic;
    color: #95a5a6;
  }
  .recycle-bin-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(236, 240, 241, 0.1);
  }
  .recycle-bin-section h3 {
    text-align: center;
    color: #f1c40f;
  }
  .restore-btn {
    background: #2ecc71;
  }
  .restore-btn:hover {
    background: #27ae60;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // 1. Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
    authDomain: "my-website-357cb.firebaseapp.com",
    databaseURL: "https://my-website-357cb-default-rtdb.firebaseio.com",
    projectId: "my-website-357cb",
    appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
  };

  // 2. Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  auth.signInAnonymously().catch(error => {
    console.error("Firebase Auth Error:", error);
  });

  // Firebase Save Sync
  async function syncNoteToFirebase(folder, encryptedNote) {
    if (!auth.currentUser) return;
    const uid = auth.currentUser.uid;
    try {
      await db.ref(`users/${uid}/folders/${folder}`).push({
        note: encryptedNote,
        timestamp: Date.now()
      });
    } catch (e) { console.error(e); }
  }

  // Firebase Load Sync
  async function syncNotesFromFirebase(folder) {
    if (!auth.currentUser) return;
    const uid = auth.currentUser.uid;
    const snapshot = await db.ref(`users/${uid}/folders/${folder}`).once('value');
    const folderData = snapshot.val();
    if (folderData) {
      const localNotes = data[folder].notes || [];
      Object.values(folderData).forEach(item => {
        if (!localNotes.includes(item.note)) localNotes.push(item.note);
      });
      data[folder].notes = localNotes;
      saveData();
      loadNotes();
    }
  }
</script>
</head>
<body>

<div class="notebook-container">
  <h2>🔒 Simple Notebook📔</h2>
  <div class="flex-row">
    <select id="folderSelect"></select>
    <input type="text" id="newFolderName" placeholder="New folder name">
    <button id="createFolderBtn">➕</button>
  </div>
  <div class="flex-row">
    <input type="password" id="folderPassword" placeholder="Password">
    <button class="delete-btn" id="deleteFolderBtn">🗑 Delete Folder</button>
  </div>
  <input type="text" id="searchNotes" placeholder="🔍 Search notes..." oninput="filterNotes()">
  <textarea id="noteArea" placeholder="Write your note here..."></textarea>
  <div class="action-buttons">
    <button id="saveBtn">💾 Save/Update</button>
    <button id="newNoteBtn">🆕 New Note</button>
  </div>
  <div class="action-buttons">
    <button id="startRecBtn">🎤 Start Recording</button>
    <button id="stopRecBtn">⏹ Stop Recording</button>
  </div>
  <div class="action-buttons">
    <button id="exportBtn">Export</button>
    <input type="file" id="importFile" style="display: none;" onchange="importData(event)">
    <button id="importBtn">Import</button>
  </div>
  <p class="status-message" id="statusMessage"></p>
  <ul id="notesList"></ul>
  <div class="recycle-bin-section">
    <h3>🗑️ Recycle Bin</h3>
    <ul id="recycleBinList"></ul>
  </div>
</div>

<script>
  let recognition;
  let data = JSON.parse(localStorage.getItem("advancedNotebookData")) || {};
  let editIndex = null;
  let activeFolderKey = null;
  let lastPassword = "";
  const DRAFTS_KEY = "advancedNotebookDrafts";
  const LAST_FOLDER_KEY = "advancedNotebookLastFolder";

  function saveData() { localStorage.setItem("advancedNotebookData", JSON.stringify(data)); }
  async function deriveKey(password, salt) { return CryptoJS.PBKDF2(password, salt, { keySize: 256/32, iterations: 1000 }).toString(); }
  function showStatus(message, type = "success") {
    const statusDiv = document.getElementById("statusMessage");
    statusDiv.textContent = message;
    statusDiv.style.color = type === "error" ? "#e74c3c" : "#2ecc71";
  }

  function updateFolderSelect() {
    const folderSelect = document.getElementById("folderSelect");
    folderSelect.innerHTML = "";
    Object.keys(data).forEach(f => {
      let opt = document.createElement("option");
      opt.value = opt.textContent = f;
      folderSelect.appendChild(opt);
    });
  }

  async function unlockFolder() {
    let folder = document.getElementById("folderSelect").value;
    let folderData = data[folder];
    if (!folderData) return;
    let pwd = document.getElementById("folderPassword").value || lastPassword || "";
    activeFolderKey = await deriveKey(pwd, folderData.salt);
    lastPassword = pwd;
    localStorage.setItem(LAST_FOLDER_KEY, folder);
    loadNotes();
    loadRecycleBin();
    await syncNotesFromFirebase(folder); // SYNC FROM CLOUD
    showStatus(`Folder "${folder}" unlocked.`);
  }

  async function saveNote() {
    let folder = document.getElementById("folderSelect").value;
    let note = document.getElementById("noteArea").value.trim();
    if (!note || !activeFolderKey) return showStatus("Enter text & unlock folder!", "error");
    
    let encryptedNote = CryptoJS.AES.encrypt(note, activeFolderKey).toString();
    if (editIndex !== null) {
      data[folder].notes[editIndex] = encryptedNote;
      editIndex = null;
    } else {
      data[folder].notes.unshift(encryptedNote);
    }
    saveData();
    document.getElementById("noteArea").value = "";
    loadNotes();
    await syncNoteToFirebase(folder, encryptedNote); // SYNC TO CLOUD
    showStatus("Note saved!");
  }

  // --- Utility functions retained from original logic ---
  function decryptNote(enc) {
    try { return CryptoJS.AES.decrypt(enc, activeFolderKey).toString(CryptoJS.enc.Utf8) || "Error"; } 
    catch { return "Error"; }
  }

  function loadNotes() {
    let folder = document.getElementById("folderSelect").value;
    let list = document.getElementById("notesList");
    list.innerHTML = "";
    (data[folder].notes || []).forEach((enc, i) => {
      let li = document.createElement("li");
      li.innerHTML = `<span>${decryptNote(enc)}</span><button class="delete-btn" onclick="moveToRecycleBin(${i})">🗑</button>`;
      li.onclick = () => editNote(i);
      list.appendChild(li);
    });
  }

  function editNote(i) {
    let folder = document.getElementById("folderSelect").value;
    document.getElementById("noteArea").value = decryptNote(data[folder].notes[i]);
    editIndex = i;
  }

  function moveToRecycleBin(i) {
    let folder = document.getElementById("folderSelect").value;
    if (!data[folder].recycled) data[folder].recycled = [];
    data[folder].recycled.push(data[folder].notes.splice(i, 1)[0]);
    saveData(); loadNotes(); loadRecycleBin();
  }

  function loadRecycleBin() {
    let folder = document.getElementById("folderSelect").value;
    let list = document.getElementById("recycleBinList");
    list.innerHTML = "";
    (data[folder].recycled || []).forEach((enc, i) => {
      let li = document.createElement("li");
      li.innerHTML = `<span>${decryptNote(enc)}</span>`;
      list.appendChild(li);
    });
  }

  async function createFolder() {
    let name = document.getElementById("newFolderName").value.trim();
    if (!name || data[name]) return;
    data[name] = { salt: CryptoJS.lib.WordArray.random(16).toString(), notes: [], recycled: [] };
    saveData(); updateFolderSelect();
    document.getElementById("folderSelect").value = name;
    await unlockFolder();
  }

  async function init() {
    if (Object.keys(data).length === 0) {
      data["Default"] = { salt: CryptoJS.lib.WordArray.random(16).toString(), notes: [], recycled: [] };
      saveData();
    }
    updateFolderSelect();
    document.getElementById("saveBtn").onclick = saveNote;
    document.getElementById("createFolderBtn").onclick = createFolder;
    document.getElementById("folderSelect").onchange = unlockFolder;
    await unlockFolder();
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
