<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📔 Advanced Secure Notebook</title>
<style>
  /* All your original CSS preserved */
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: #ecf0f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  .notebook-container { background: rgba(44, 62, 80, 0.9); padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.25); backdrop-filter: blur(8px); border: 1px solid rgba(236, 240, 241, 0.1); }
  h2 { text-align: center; margin-bottom: 20px; color: #3498db; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
  label { font-size: 15px; margin-bottom: 3px; color: #8fc5f9; display: block; }
  select, input[type="text"], input[type="password"], textarea, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #34495e; border-radius: 8px; box-sizing: border-box; background: #34495e; color: #ecf0f1; font-size: 16px; }
  textarea { min-height: 150px; resize: vertical; }
  button { background: #3498db; cursor: pointer; transition: background 0.3s ease; font-weight: bold; border: none; }
  button:hover { background: #2980b9; }
  .delete-btn { background: #e74c3c; }
  .flex-row { display: flex; gap: 10px; align-items: center; }
  .flex-row input, .flex-row select { flex-grow: 1; margin: 0; }
  .flex-row button { width: auto; padding: 12px 18px; margin: 0; }
  #notesList, #recycleBinList { list-style: none; padding: 0; margin-top: 20px; max-height: 300px; overflow-y: auto; }
  #notesList li, #recycleBinList li { background: #34495e; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
  .action-buttons button { flex-grow: 1; }
  .status-message { text-align: center; margin-top: 10px; font-style: italic; color: #95a5a6; }
  .recycle-bin-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(236, 240, 241, 0.1); }
  .recycle-bin-section h3 { text-align: center; color: #f1c40f; }
  .restore-btn { background: #2ecc71; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // Firebase initialization
  const firebaseConfig = {
    apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
    authDomain: "my-website-357cb.firebaseapp.com",
    databaseURL: "https://my-website-357cb-default-rtdb.firebaseio.com",
    projectId: "my-website-357cb",
    appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  auth.signInAnonymously().catch(e => console.error("Firebase Auth Error", e));
</script>
</head>
<body>

<div class="notebook-container">
  <h2>🔒 Simple Notebook📔</h2>
  
  <div class="flex-row">
    <select id="folderSelect"></select>
    <input type="text" id="newFolderName" placeholder="New folder name">
    <button id="createFolderBtn" type="button">➕</button>
  </div>
  <div class="flex-row">
    <input type="password" id="folderPassword" placeholder="Folder password">
    <button class="delete-btn" id="deleteFolderBtn" type="button">🗑 Delete Folder</button>
  </div>

  <input type="text" id="searchNotes" placeholder="🔍 Search notes..." oninput="filterNotes()">

  <textarea id="noteArea" placeholder="Write your note here..."></textarea>
  
  <div class="action-buttons">
    <button id="saveBtn" type="button">💾 Save/Update</button>
    <button id="newNoteBtn" type="button">🆕 New Note</button>
  </div>

  <div class="action-buttons">
    <button id="startRecBtn" type="button">🎤 Start Recording</button>
    <button id="stopRecBtn" type="button">⏹ Stop Recording</button>
  </div>
  
  <div class="action-buttons">
    <button id="exportBtn" type="button">Export</button>
    <input type="file" id="importFile" style="display: none;" onchange="importData(event)">
    <button id="importBtn" type="button">Import</button>
  </div>

  <p class="status-message" id="statusMessage"></p>
  <ul id="notesList"></ul>

  <div class="recycle-bin-section">
    <h3>🗑️ Recycle Bin</h3>
    <ul id="recycleBinList"></ul>
  </div>
</div>

<script>
  // YOUR ORIGINAL LOGIC
  let recognition;
  let data = JSON.parse(localStorage.getItem("advancedNotebookData")) || {};
  let editIndex = null;
  let activeFolderKey = null;
  let lastPassword = "";
  const DRAFTS_KEY = "advancedNotebookDrafts";
  const LAST_FOLDER_KEY = "advancedNotebookLastFolder";

  function saveData() { localStorage.setItem("advancedNotebookData", JSON.stringify(data)); }

  async function deriveKey(password, salt) {
    return CryptoJS.PBKDF2(password, salt, { keySize: 256/32, iterations: 1000 }).toString();
  }

  function showStatus(message, type = "success") {
    const statusDiv = document.getElementById("statusMessage");
    statusDiv.textContent = message;
    statusDiv.style.color = type === "error" ? "#e74c3c" : "#2ecc71";
  }

  // --- FIREBASE SYNC HELPERS ---
  async function syncToFirebase(folder, encryptedNote) {
    if (!auth.currentUser) return;
    db.ref(`users/${auth.currentUser.uid}/folders/${folder}`).push({
      note: encryptedNote, timestamp: Date.now()
    });
  }

  async function syncFromFirebase(folder) {
    if (!auth.currentUser) return;
    const snapshot = await db.ref(`users/${auth.currentUser.uid}/folders/${folder}`).once('value');
    const cloudData = snapshot.val();
    if (!cloudData) return;
    const localNotes = data[folder].notes || [];
    Object.values(cloudData).forEach(item => {
      if (!localNotes.includes(item.note)) localNotes.push(item.note);
    });
    data[folder].notes = localNotes;
    saveData(); loadNotes();
  }

  // --- MODIFIED ORIGINAL FUNCTIONS ---
  async function unlockFolder() {
    let folder = document.getElementById("folderSelect").value;
    if (!data[folder]) return;
    let pwd = document.getElementById("folderPassword").value || lastPassword || "";
    activeFolderKey = await deriveKey(pwd, data[folder].salt);
    lastPassword = pwd;
    localStorage.setItem(LAST_FOLDER_KEY, folder);
    loadNotes();
    loadRecycleBin();
    restoreDraftForFolder(folder);
    showStatus(`Folder unlocked.`);
    await syncFromFirebase(folder); // New cloud sync
  }

  async function saveNote() {
    let folder = document.getElementById("folderSelect").value;
    let note = document.getElementById("noteArea").value.trim();
    if (!note || !activeFolderKey) return showStatus("Unlock folder first!", "error");
    
    let encryptedNote = CryptoJS.AES.encrypt(note, activeFolderKey).toString();
    if (editIndex !== null) {
      data[folder].notes[editIndex] = encryptedNote;
      editIndex = null;
    } else {
      data[folder].notes.unshift(encryptedNote);
    }
    saveData();
    document.getElementById("noteArea").value = "";
    loadNotes();
    showStatus("Note saved!");
    await syncToFirebase(folder, encryptedNote); // New cloud sync
  }

  // --- REST OF YOUR ORIGINAL FUNCTIONS ---
  function decryptNote(encrypted) {
    try {
      let bytes = CryptoJS.AES.decrypt(encrypted, activeFolderKey);
      return bytes.toString(CryptoJS.enc.Utf8) || "Unable to decrypt";
    } catch { return "Unable to decrypt"; }
  }

  function loadNotes() {
    let folder = document.getElementById("folderSelect").value;
    let list = document.getElementById("notesList");
    list.innerHTML = "";
    if (!activeFolderKey) return;
    (data[folder].notes || []).forEach((enc, i) => {
      let li = document.createElement("li");
      li.innerHTML = `<span onclick="editNote(${i})">${decryptNote(enc)}</span><button class="delete-btn" onclick="moveToRecycleBin(${i})">🗑</button>`;
      list.appendChild(li);
    });
  }

  window.editNote = (i) => {
    let folder = document.getElementById("folderSelect").value;
    document.getElementById("noteArea").value = decryptNote(data[folder].notes[i]);
    editIndex = i;
  };

  window.moveToRecycleBin = (i) => {
    let folder = document.getElementById("folderSelect").value;
    if (!data[folder].recycled) data[folder].recycled = [];
    data[folder].recycled.unshift(data[folder].notes.splice(i, 1)[0]);
    saveData(); loadNotes(); loadRecycleBin();
  };

  function loadRecycleBin() {
    let folder = document.getElementById("folderSelect").value;
    let list = document.getElementById("recycleBinList");
    list.innerHTML = "";
    if (!data[folder]?.recycled) return;
    data[folder].recycled.forEach((enc, i) => {
      let li = document.createElement("li");
      li.innerHTML = `<span>${decryptNote(enc)}</span><button class="restore-btn" onclick="restoreNote(${i})">♻️</button>`;
      list.appendChild(li);
    });
  }

  window.restoreNote = (i) => {
    let folder = document.getElementById("folderSelect").value;
    data[folder].notes.unshift(data[folder].recycled.splice(i, 1)[0]);
    saveData(); loadNotes(); loadRecycleBin();
  };

  function startRecording() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return showStatus("Browser not supported", "error");
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.onresult = (e) => {
      document.getElementById("noteArea").value += e.results[e.results.length-1][0].transcript + " ";
    };
    recognition.start();
    showStatus("Recording...");
  }

  function restoreDraftForFolder(folder) {
    const map = JSON.parse(localStorage.getItem(DRAFTS_KEY)) || {};
    if (map[folder]) {
      try {
        const bytes = CryptoJS.AES.decrypt(map[folder], activeFolderKey);
        document.getElementById("noteArea").value = bytes.toString(CryptoJS.enc.Utf8);
      } catch(e) {}
    }
  }

  function init() {
    if (Object.keys(data).length === 0) {
      data["Default"] = { salt: CryptoJS.lib.WordArray.random(16).toString(), notes: [], recycled: [] };
      saveData();
    }
    const select = document.getElementById("folderSelect");
    Object.keys(data).forEach(f => {
      let opt = document.createElement("option"); opt.value = f; opt.textContent = f;
      select.appendChild(opt);
    });

    document.getElementById("saveBtn").onclick = saveNote;
    document.getElementById("folderSelect").onchange = unlockFolder;
    document.getElementById("createFolderBtn").onclick = () => {
      let n = document.getElementById("newFolderName").value.trim();
      if(n) {
        data[n] = { salt: CryptoJS.lib.WordArray.random(16).toString(), notes: [], recycled: [] };
        saveData(); location.reload();
      }
    };
    document.getElementById("startRecBtn").onclick = startRecording;
    document.getElementById("stopRecBtn").onclick = () => recognition?.stop();
    document.getElementById("exportBtn").onclick = () => {
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'backup.json'; a.click();
    };
    document.getElementById("newNoteBtn").onclick = () => { document.getElementById("noteArea").value = ""; editIndex = null; };

    unlockFolder();
  }

  document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
