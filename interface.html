<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvyn Nixcy OS - Live Interface</title>
    <style>
        :root {
            --bg-dark: #05050a;
            --sidebar-bg: rgba(10, 10, 20, 0.95);
            --card-bg: rgba(20, 20, 35, 0.7);
            --neon-pink: #ff2d75;
            --neon-blue: #00d2ff;
            --text-main: #ffffff;
            --terminal-green: #00ff41;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- Auth Overlay --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 10, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid var(--neon-pink);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.3);
        }

        .login-card input {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .login-card button {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* --- Main Layout --- */
        .os-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-pink);
            margin-bottom: 50px;
        }

        .nav-item {
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(255, 45, 117, 0.2), transparent);
            border-left: 4px solid var(--neon-pink);
            color: white;
        }

        .main-content {
            padding: 30px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
            overflow-y: auto;
        }

        /* --- Widgets --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 20px;
            width: 300px;
            color: white;
        }

        .hero-widget {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            position: relative;
        }

        .neon-text {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* --- Terminal --- */
        .terminal-widget {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: #111;
            padding: 10px 20px;
            font-size: 12px;
            color: #888;
            border-bottom: 1px solid #222;
        }

        #terminal-body {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 14px;
            color: var(--terminal-green);
        }

        .input-line {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #term-input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex-grow: 1;
            font-family: inherit;
        }

        .prompt { color: var(--neon-pink); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h2>SYSTEM OWNER LOGIN</h2>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Access Code">
            <button id="login-btn">INITIALIZE CORE</button>
            <p id="auth-error" style="color: var(--neon-pink); font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="os-wrapper">
        <aside class="sidebar">
            <div class="logo">SOLVYN NIXCY OS</div>
            <nav>
                <div class="nav-item active">Dashboard</div>
                <div class="nav-item">Core System</div>
                <div class="nav-item">Heart Module</div>
                <div class="nav-item">System Logs</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <input type="text" class="search-box" placeholder="Search in Solvyn Nixcy OS...">
                <div class="user-info">Nicholas - System Owner</div>
            </header>

            <section class="hero-widget">
                <h1>Welcome back, <span class="neon-text">Nicholas</span> 👋</h1>
                <p>Solvyn Nixcy OS is running smoothly with your Website Firebase.</p>
            </section>

            <section class="terminal-widget">
                <div class="terminal-header">NIXCY TERMINAL v1.0.0</div>
                <div id="terminal-body">
                    <div id="history"></div>
                    <div class="input-line">
                        <span class="prompt">nixcy@solvyn-os:~$</span>
                        <input type="text" id="term-input" autofocus autocomplete="off">
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
            authDomain: "my-website-357cb.firebaseapp.com",
            projectId: "my-website-357cb",
            storageBucket: "my-website-357cb.firebasestorage.app",
            messagingSenderId: "759627961944",
            appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const overlay = document.getElementById('auth-overlay');
        const loginBtn = document.getElementById('login-btn');
        const termInput = document.getElementById('term-input');
        const history = document.getElementById('history');

        // --- Auth Monitoring ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                overlay.style.display = 'none';
                initTerminalSync();
            }
        });

        loginBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                document.getElementById('auth-error').innerText = "Access Denied: Invalid System Key";
            });
        });

        // --- Terminal Sync ---
        function initTerminalSync() {
            const q = query(collection(db, "website_activity"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                history.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const line = document.createElement('div');
                    line.style.marginBottom = '5px';
                    line.innerHTML = `<span class="prompt">></span> ${data.command}`;
                    history.appendChild(line);
                });
                document.getElementById('terminal-body').scrollTop = history.scrollHeight;
            });
        }

        termInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value;
                if (cmd.trim()) {
                    await addDoc(collection(db, "website_activity"), {
                        command: cmd,
                        timestamp: serverTimestamp()
                    });
                    termInput.value = '';
                }
            }
        });
    </script>
</body>
</html>
