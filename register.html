<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NK Biometric Registration - Register students for attendance">
  <title>NK Biometric Registration</title>
  
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4d 100%);
      color: #00f7ff;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      color: #00f7ff;
      margin-bottom: 30px;
      text-align: center;
      text-shadow: 0 0 20px rgba(0,247,255,0.5);
      letter-spacing: 2px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(0,247,255,0.05);
      padding: 30px;
      border-radius: 12px;
      border: 2px solid #00f7ff;
      box-shadow: 0 0 20px rgba(0,247,255,0.3);
      backdrop-filter: blur(10px);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #00f7ff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid rgba(0,247,255,0.3);
      border-radius: 6px;
      background: rgba(10,15,44,0.8);
      color: #00f7ff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00f7ff;
      box-shadow: 0 0 15px rgba(0,247,255,0.5);
    }

    input::placeholder {
      color: rgba(0,247,255,0.5);
    }

    .video-wrapper {
      position: relative;
      display: block;
      width: 100%;
      margin: 20px 0;
      border: 2px solid #00f7ff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,247,255,0.3);
    }

    video {
      width: 100%;
      height: 300px;
      background: #000;
      object-fit: cover;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(135deg, #00f7ff, #00aaff);
      color: #0a0f2c;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0,247,255,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0,247,255,0.6);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .success {
      background: rgba(0,200,100,0.2);
      border: 1px solid rgba(0,200,100,0.5);
      color: #00ff88;
    }

    .error {
      background: rgba(255,100,100,0.2);
      border: 1px solid rgba(255,100,100,0.5);
      color: #ff6666;
    }

    .info {
      background: rgba(0,150,255,0.2);
      border: 1px solid rgba(0,150,255,0.5);
      color: #00f7ff;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #00f7ff;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      text-decoration: underline;
      text-shadow: 0 0 10px rgba(0,247,255,0.5);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
        margin-bottom: 20px;
      }

      .container {
        padding: 20px;
      }

      video {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <h1>📝 Student Registration</h1>

  <div class="container">
    <div class="form-group">
      <label for="studentName">Student Name *</label>
      <input type="text" id="studentName" placeholder="Enter full name" required>
    </div>

    <div class="form-group">
      <label for="country">Country *</label>
      <input type="text" id="country" placeholder="e.g., Nigeria" required>
    </div>

    <div class="form-group">
      <label for="district">District/State *</label>
      <input type="text" id="district" placeholder="e.g., Lagos" required>
    </div>

    <div class="form-group">
      <label for="village">Village/City *</label>
      <input type="text" id="village" placeholder="e.g., Ikoyi" required>
    </div>

    <div class="form-group">
      <label>Capture Face for Registration</label>
      <div class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
      </div>
    </div>

    <button id="captureBtn" onclick="captureAndRegister()">📸 Capture & Register</button>
    <button id="backBtn" onclick="goBack()">← Back to Attendance</button>

    <div id="status" class="status" style="display: none;"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBKp0yZqLMXkPZqLH5ZqLH5ZqLH5ZqLH5Z",
      authDomain: "my-website-357cb.firebaseapp.com",
      projectId: "my-website-357cb",
      storageBucket: "my-website-357cb.appspot.com",
      messagingSenderId: "759627961944",
      appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const video = document.getElementById("video");
    const statusDiv = document.getElementById("status");
    const captureBtn = document.getElementById("captureBtn");

    let faceDescriptor = null;

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
      } catch (error) {
        showStatus("Camera access denied!", "error");
      }
    }

    async function initModels() {
      const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        showStatus("System ready. Position your face and click 'Capture & Register'", "info");
      } catch (error) {
        showStatus("Error loading models", "error");
      }
    }

    window.captureAndRegister = async function() {
      const name = document.getElementById("studentName").value.trim();
      const country = document.getElementById("country").value.trim();
      const district = document.getElementById("district").value.trim();
      const village = document.getElementById("village").value.trim();

      if (!name || !country || !district || !village) {
        showStatus("Please fill all fields", "error");
        return;
      }

      try {
        captureBtn.disabled = true;
        showStatus("Detecting face...", "info");

        const detection = await faceapi.detectSingleFace(
          video,
          new faceapi.TinyFaceDetectorOptions()
        ).withFaceLandmarks().withFaceDescriptor();

        if (!detection) {
          showStatus("No face detected. Please try again.", "error");
          captureBtn.disabled = false;
          return;
        }

        faceDescriptor = Array.from(detection.descriptor);

        // Check if student already exists
        const q = query(collection(db, "students"), where("name", "==", name));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
          showStatus("Student already registered!", "error");
          captureBtn.disabled = false;
          return;
        }

        showStatus("Registering student...", "info");

        // Register student
        await addDoc(collection(db, "students"), {
          name: name,
          country: country,
          district: district,
          village: village,
          faceDescriptor: faceDescriptor,
          approved: false,
          registeredAt: new Date()
        });

        showStatus("✅ Registration successful! Student pending admin approval.", "success");
        
        setTimeout(() => {
          goBack();
        }, 2000);

      } catch (error) {
        console.error("Registration error:", error);
        showStatus("Registration failed. Please try again.", "error");
      } finally {
        captureBtn.disabled = false;
      }
    };

    window.goBack = function() {
      window.location.href = 'index.html';
    };

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      statusDiv.style.display = 'block';
    }

    // Initialize on load
    initCamera();
    initModels();
  </script>
</body>
</html>
