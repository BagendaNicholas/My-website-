<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Cube</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    overflow:hidden;
}

/* Scene */
.scene{
    width:220px;
    height:220px;
    perspective:1200px;
}

/* Cube */
.cube{
    width:220px;
    height:220px;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s infinite linear;
}

/* Faces */
.cube-face-link{
    position:absolute;
    width:220px;
    height:220px;
}

/* Face style */
.cube-face{
    width:100%;
    height:100%;
    border:2px solid rgba(255,255,255,0.2);
    border-radius:12px;
    overflow:hidden;
    background:#222;
}

/* Images */
.cube-face img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PERFECT 3D POSITIONS */

.front{
    transform:translateZ(110px);
}

.back{
    transform:rotateY(180deg) translateZ(110px);
}

.right{
    transform:rotateY(90deg) translateZ(110px);
}

.left{
    transform:rotateY(-90deg) translateZ(110px);
}

.top{
    transform:rotateX(90deg) translateZ(110px);
}

.bottom{
    transform:rotateX(-90deg) translateZ(110px);
}

/* REAL 6-SIDE ROTATION */

@keyframes spin{

    0%{
        transform:rotateX(-20deg) rotateY(0deg);
    }

    25%{
        transform:rotateX(-20deg) rotateY(90deg);
    }

    50%{
        transform:rotateX(-20deg) rotateY(180deg);
    }

    75%{
        transform:rotateX(-20deg) rotateY(270deg);
    }

    100%{
        transform:rotateX(-20deg) rotateY(360deg);
    }
}

</style>
</head>

<body>

<div class="scene">

<div class="cube">

    <!-- FRONT -->
    <a href="https://bayonaedith.github.io/My-school-project/admin.1.html"
       class="cube-face-link front">

        <div class="cube-face">
            <img src="https://i.postimg.cc/W4Cpqh6k/1759816092973.png">
        </div>

    </a>

    <!-- BACK -->
    <a href="menu.html"
       class="cube-face-link back">

        <div class="cube-face">
            <img src="https://i.postimg.cc/DZGvrnBq/1759488455267.png">
        </div>

    </a>

    <!-- RIGHT -->
    <a href="chat&search.html"
       class="cube-face-link right">

        <div class="cube-face">
            <img src="https://i.postimg.cc/d1Cs2w4S/1759816077657.png">
        </div>

    </a>

    <!-- LEFT -->
    <a href="nicholassearch.html"
       class="cube-face-link left">

        <div class="cube-face">
            <img src="https://i.postimg.cc/BvXQvxDt/1759814336455.png">
        </div>

    </a>

    <!-- TOP -->
    <a href="minigooglechat.html"
       class="cube-face-link top">

        <div class="cube-face">
            <img src="https://i.postimg.cc/SQWQjQXG/1759486824644.png">
        </div>

    </a>

    <!-- BOTTOM -->
    <a href="message.html"
       class="cube-face-link bottom">

        <div class="cube-face">
            <img src="https://i.postimg.cc/t4yDG3Fq/Mon-21-07-2025-16-26-06.png">
        </div>

    </a>

</div>

</div>

</body>
</html>
