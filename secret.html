<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret Access</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1117, #161b22, #1f2937);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }

    h1{
      margin-bottom: 30px;
      font-size: 40px;
      text-shadow: 0 0 15px #0d6efd;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow: 0 0 10px #0d6efd;
      }
      to{
        text-shadow: 0 0 25px #00bfff;
      }
    }

    .container,
    .centered-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 25px;
    }

    button {
      position: relative;
      padding: 16px 28px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      background: linear-gradient(145deg, #0d6efd, #0044aa);
      transition: 0.3s;
      overflow: hidden;
      box-shadow:
        0 0 10px rgba(13,110,253,0.5),
        0 0 25px rgba(13,110,253,0.3);
    }

    button::before{
      content:'';
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.2);
      transition:0.5s;
    }

    button:hover::before{
      left:100%;
    }

    button:hover {
      transform: translateY(-5px) scale(1.05);
      background: linear-gradient(145deg, #1f7bff, #005eff);
      box-shadow:
        0 0 20px rgba(0,191,255,0.8),
        0 0 40px rgba(0,191,255,0.5);
    }

    .ai-title{
      margin-bottom:20px;
      font-size:26px;
      color:#00bfff;
      text-shadow:0 0 10px #00bfff;
    }

    .footer{
      position: fixed;
      bottom: 10px;
      text-align:center;
      font-size:14px;
      color:#aaa;
    }

    .floating-circle{
      position:absolute;
      border-radius:50%;
      background:rgba(0,191,255,0.08);
      animation: float 10s infinite linear;
    }

    .circle1{
      width:180px;
      height:180px;
      top:10%;
      left:5%;
    }

    .circle2{
      width:250px;
      height:250px;
      bottom:10%;
      right:5%;
    }

    @keyframes float{
      0%{
        transform:translateY(0px) rotate(0deg);
      }
      50%{
        transform:translateY(-20px) rotate(180deg);
      }
      100%{
        transform:translateY(0px) rotate(360deg);
      }
    }

    @media(max-width:768px){
      button{
        width:100%;
        max-width:320px;
      }

      h1{
        font-size:30px;
        text-align:center;
      }
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="floating-circle circle1"></div>
  <div class="floating-circle circle2"></div>

  <h1>🔐 Secret Access Portal</h1>

  <!-- Top Buttons -->
  <div class="container">
    <button onclick="window.location.href='notebook.html'">
      📔 Open Notebook
    </button>

    <button onclick="window.location.href='rotating.html'">
      😇 Choose
    </button>

    <button id="logoutBtn">
      🔓 Logout
    </button>
  </div>

  <div class="ai-title">
    🤖 AI Assistants
  </div>

  <!-- AI Buttons -->
  <div class="centered-container">

    <button onclick="openNewPage('guardian-ai.html')">
      🛡 Guardian
    </button>

    <button onclick="openNewPage('grayson.html')">
      🤖 Grayson
    </button>

    <button onclick="openNewPage('gemini.html')">
      🌌 Gemini
    </button>

  </div>

  <div class="footer">
    Powered by NicholasAI ⚡
  </div>

  <script>

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
      authDomain: "my-website-357cb.firebaseapp.com",
      databaseURL: "https://my-website-357cb-default-rtdb.firebaseio.com",
      projectId: "my-website-357cb",
      appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    // Logout Function
    const logoutBtn = document.getElementById('logoutBtn');

    logoutBtn.addEventListener('click', () => {

      auth.signOut()
      .then(() => {

        alert("You have been logged out.");

        window.location.href = "login.html";

      })
      .catch((error) => {

        console.error("Logout error:", error);

      });

    });

    // Open AI Pages in New Tabs/Windows
    function openNewPage(url) {

      const newWindow = window.open(url, '_blank');

      if(newWindow){

        newWindow.focus();

      } else {

        alert("Popup blocked! Please allow popups.");

      }
    }

    // Protect Page
    auth.onAuthStateChanged(user => {

      if(!user){

        alert("Access denied ❌");

        window.location.href = "login.html";
      }

    });

  </script>

</body>
</html>
