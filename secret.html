<!DOCTYPE html>
<html>
<head>
  <title>Secret Zone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🛡️ SECRET ZONE</h2>

  <p id="userEmail"></p>

  <!-- Notebook Button -->
  <button onclick="openNotebook()">📔 Open Notebook</button>

  <hr style="margin:20px 0;">

  <!-- Note Save Section -->
  <textarea id="note" placeholder="Write your secret..." style="width:100%;height:100px;"></textarea>
  
  <button onclick="saveNote()">Save Note 💾</button>

  <br><br>

  <!-- Logout -->
  <button onclick="logout()">Logout 🚪</button>
</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔐 Protect page
onAuthStateChanged(auth, user => {
  if (!user) {
    alert("Access denied ❌");
    window.location.href = "login.html";
  } else {
    document.getElementById("userEmail").innerText = "Logged in as: " + user.email;
  }
});

// 📔 Open notebook
window.openNotebook = function() {
  window.location.href = "index.2.2.html";
}

// 💾 Save note to Firestore
window.saveNote = async function() {
  const note = document.getElementById("note").value.trim();
  const user = auth.currentUser;

  if (!note) {
    alert("Write something first 😤");
    return;
  }

  try {
    await addDoc(collection(db, "notes"), {
      text: note,
      user: user.email,
      time: new Date()
    });

    alert("Saved securely 🛡️");
    document.getElementById("note").value = "";
  } catch (e) {
    alert("Error saving ❌");
  }
}

// 🚪 Logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
