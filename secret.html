<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Access</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a1a;
      color: #fff;
      margin: 0;
    }

    .container, .centered-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0d6efd;
      color: #fff;
      transition: transform 0.2s, background-color 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #0b5ed7;
    }

    iframe {
      width: 90%;
      height: 500px;
      border: 2px solid #0d6efd;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- Top buttons -->
  <div class="container">
    <button onclick="window.location.href=('https://bayonaedith.github.io/My-school-project/admin.1.html')">🎯 Dashboard</button>
    <button onclick="window.location.href='index2.2.html'">📔 Open Notebook</button>
    <button onclick="window.location.href='index2.6.html'">💬 Min Chat</button>
    <button id="logoutBtn">🔓 Logout</button>
  </div>

  <!-- Center buttons -->
  <div class="centered-container">
    <button onclick="openIframe('grayson.html')">🤖 Grayson</button>
    <button onclick="openIframe('gemini.html')">🌌 Gemini</button>
  </div>

  <!-- Iframe container -->
  <iframe id="iframeDisplay" src=""></iframe>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA1cxvtP7aw_w1QcZ_ytBtIPbzWtlTVhzg",
      authDomain: "my-website-357cb.firebaseapp.com",
      databaseURL: "https://my-website-357cb-default-rtdb.firebaseio.com",
      projectId: "my-website-357cb",
      appId: "1:759627961944:web:eb65a9fbd8856fbdab5c2d"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Logout functionality
    const logoutBtn = document.getElementById('logoutBtn');
    logoutBtn.addEventListener('click', () => {
      auth.signOut().then(() => {
        alert("You have been logged out.");
        window.location.href = "login.html";
      }).catch((error) => {
        console.error("Logout error:", error);
      });
    });

    // Open iframe function
    function openIframe(url) {
      const iframe = document.getElementById('iframeDisplay');
      iframe.src = url;
      iframe.scrollIntoView({ behavior: 'smooth' });
    }

    // Optional: Redirect if not logged in
    auth.onAuthStateChanged(user => {
      if (!user) {
        alert("Access denied ❌");
        window.location.href = "login.html";
      }
    });
  </script>

</body>
</html>
