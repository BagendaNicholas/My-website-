<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Access</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a1a;
      color: #fff;
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: space-between;
      width: 80%;
      max-width: 800px;
      margin-bottom: 20px;
    }

    .container button,
    .centered-container button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #0d6efd;
      color: #fff;
      transition: transform 0.2s, background-color 0.2s;
    }

    .container button:hover,
    .centered-container button:hover {
      transform: scale(1.05);
      background-color: #0b5ed7;
    }

    .centered-container {
      margin: 15px 0;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <button class="main-button" onclick="window.location.href='index2.2.html'">
      📔 Open Notebook
    </button>

    <button class="main-button" onclick="window.location.href='index2.6.html'">
      💬 Min Chat
    </button>
  </div>

  <div class="centered-container">
    <button class="main-button" onclick="window.location.href='https://bayonaedith.github.io/My-school-project/admin.1.html'">
      🎯 Dashboard
    </button>

    <button class="main-button" onclick="window.location.href='grayson.html'">
      🤖 Grayson
    </button>

    <button class="main-button" onclick="window.location.href='gemini.html'">
      🌌 Gemini
    </button>
  </div>

</body>
</html>
