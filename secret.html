<!DOCTYPE html>
<html>
<body>

<h1>🛡️ SECRET ZONE</h1>

<script type="module">
import { auth } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, user => {
  if (!user) {
    alert("Access denied ❌");
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
