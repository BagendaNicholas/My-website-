<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Access</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
      color: #fff;
      margin: 0;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 2.5rem;
      color: #0d6efd;
      text-shadow: 0 0 10px #0d6efd;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .main-button {
      padding: 18px 28px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(145deg, #0d6efd, #0b5ed7);
      color: #fff;
      box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4);
      transition: all 0.3s ease;
    }

    .main-button:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 6px 20px rgba(13, 110, 253, 0.6);
    }

    .secondary-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .secondary-button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(145deg, #6c757d, #495057);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    .secondary-button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <h1>🚀 Secret Access</h1>

  <!-- Primary actions -->
  <div class="container">
    <button class="main-button" onclick="window.location.href='index2.2.html'">
      📔 Open Notebook
    </button>
    <button class="main-button" onclick="window.location.href='index2.6.html'">
      💬 Min Chat
    </button>
    <button class="main-button" onclick="window.location.href='https://bayonaedith.github.io/My-school-project/admin.1.html'">
      🎯 Dashboard
    </button>
  </div>

  <!-- Secondary actions -->
  <div class="secondary-container">
    <button class="secondary-button" onclick="window.location.href='grayson.html'">
      🤖 Grayson
    </button>
    <button class="secondary-button" onclick="window.location.href='gemini.html'">
      🌌 Gemini
    </button>
  </div>

</body>
</html>
